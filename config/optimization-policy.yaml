# 优化策略配置

thresholds:
  empty_rate_warning: 0.8
  token_budget_warning: 0.1
  inactive_days_warning: 30
  success_rate_warning: 0.5
  high_frequency_threshold: 60

auto_optimize:
  tier_1: true
  tier_2: false
  tier_3: false
  max_changes_per_run: 3

notification:
  channels:
    - kimi
    - feishu
  progressive_timeline:
    - delay: 0
      channel: kimi
    - delay: 5
      channel: feishu
    - delay: 15
      action: execute
    - delay: 30
      action: pending

reporting:
  daily:
    enabled: true
    time: "00:00"
  weekly:
    enabled: true
    time: "18:17"
    day: friday
  monthly:
    enabled: true
    time: "09:17"
    day: 3

budget:
  daily_token_budget: 18000
  max_tokens_per_execution: 5000
  monthly_token_budget: 540000

retention:
  execution_log: 90
  efficiency_stats: 365
  backup_snapshots: 30
