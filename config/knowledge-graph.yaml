## 二、文件更新一致性检查清单模板

```yaml
consistency_check_template:
  source_update:
    file: "[源文件路径]"
    change_type: "[新增/修改/删除]"
    change_summary: "[简要描述]"
    timestamp: "[ISO-8601]"
    
  affected_files:
    - file: "[受影响文件1]"
      priority: P0
      check_items:
        - "[检查项1]"
        - "[检查项2]"
      status: "[待检查/已更新/无需更新]"
      updated_by: "[更新人]"
      updated_at: "[时间戳]"
      
    - file: "[受影响文件2]"
      priority: P1
      check_items:
        - "[检查项1]"
      status: "[待检查/已更新/无需更新]"
      
  validation:
    p0_all_checked: false
    p1_all_checked: false
    consistency_passed: false
    checked_by: "[检查人]"
    checked_at: "[时间戳]"
    notes: "[备注]"
```

