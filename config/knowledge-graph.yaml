## 三、使用流程

### 3.1 更新前查询

```bash
# 查询某个文件更新会影响哪些文件
python3 scripts/knowledge_graph_query.py --source fang_yifeng_v2

# 输出示例：
# 源文件: memory/experts/fang_yifeng_v2.md
# P0级影响文件: 3个
#   - feishu-personas/13_ANNOUNCE_官宣官.md
#   - feishu-personas/项目_官宣执行手册.md
#   - product2-partner-matching/PFI-2.0-Ultimate-Handbook.md
# P1级影响文件: 3个
# P2级影响文件: 1个
```

### 3.2 更新后检查

```bash
# 生成一致性检查清单
python3 scripts/consistency_check_generator.py \
  --source fang_yifeng_v2 \
  --output checklists/2026-03-24_fang_yifeng_update.yaml

# 执行检查
python3 scripts/consistency_validator.py \
  --checklist checklists/2026-03-24_fang_yifeng_update.yaml \
  --report report.md
```

