      correct_known: 5
      honest_unknown: 3
     超预期解决: 15
      预防风险: 20
    penalties:
      known_fake: -20
      unknown_guess: -10
      wrong_inference: -8
      missing_tag: -5
    decay: "长期不互动每日-1分"

