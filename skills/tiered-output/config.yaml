# 分级输出系统配置文件
# Tiered Output System Configuration
# 版本: v1.0
# 更新时间: 2026-03-21

# ==================== 基础配置 ====================
system:
  name: "tiered-output"
  version: "1.0.0"
  enabled: true
  default_tier: "L2"
  debug_mode: false

# ==================== 分级标准配置 ====================
tier_definitions:
  L1:
    name: "极简版"
    description: "一句话输出，适用于紧急响应和简单确认"
    token_limit:
      max: 50
      target: 30
    format_rules:
      max_sentences: 2
      max_lines: 1
      allow_bullets: false
      allow_tables: false
      allow_headers: false
    template_structure:
      - "conclusion"      # 结论/状态
      - "action_item"     # 一个行动项
    time_target: "<1s"    # 响应时间目标
    
  L2:
    name: "标准版"
    description: "一段话输出，平衡信息量和简洁度"
    token_limit:
      min: 100
      max: 500
      target: 350
    format_rules:
      max_sentences: 15
      max_lines: 30
      max_sections: 3
      max_bullet_points: 6
      allow_bullets: true
      allow_tables: false
      allow_headers: true
      header_level: "##"
    template_structure:
      - "summary"         # 摘要
      - "key_findings"    # 关键发现（3-5点）
      - "next_steps"      # 下一步行动
    time_target: "<3s"
    
  L3:
    name: "详细版"
    description: "深度分析报告，包含完整分析、证据和多选项"
    token_limit:
      min: 1000
      target: 1500
    format_rules:
      min_sections: 4
      allow_bullets: true
      allow_tables: true
      allow_headers: true
      header_level: "#"
      require_evidence: true
      require_options: true
    template_structure:
      - "title"           # 报告标题
      - "executive_summary"  # 执行摘要
      - "background"      # 背景与上下文
      - "detailed_analysis"  # 详细分析
      - "evidence_data"   # 证据与数据
      - "options"         # 可选方案
      - "recommendation"  # 推荐方案
      - "action_plan"     # 执行计划
      - "appendix"        # 附录
    time_target: "<10s"

# ==================== 触发规则配置 ====================
triggers:
  # 用户指令触发
  user_commands:
    L1:
      - "/brief"
      - "/b"
      - "/short"
      - "简短"
      - "一句话"
    L2:
      - "/normal"
      - "/n"
      - "/standard"
      - "标准"
    L3:
      - "/detail"
      - "/d"
      - "/full"
      - "/analyze"
      - "详细"
      - "分析"
      - "完整"
  
  # 优先级触发
  priority_mapping:
    P0:
      default_tier: "L2"
      keywords_for_L3:
        - "分析"
        - "报告"
        - "诊断"
        - "根因"
        - "深度"
      urgent_simple_tier: "L1"  # 简单紧急任务用L1
    P1:
      default_tier: "L2"
    P2:
      default_tier: "L2"
    P3:
      default_tier: "L1"  # 低优先级默认极简
  
  # Token预算触发
  token_budget:
    critical_threshold: 10    # <10% 临界模式
    low_threshold: 30         # <30% 节省模式
    medium_threshold: 70      # 30-70% 标准模式
    # >70% 正常模式
    actions:
      critical:
        force_tier: "L1"
        add_warning: true
        warning_message: "🚨 Token预算临界！仅提供核心结论，回复/expand查看完整版"
      low:
        force_tier: "L1"
        add_notice: true
        notice_message: "⚠️ Token预算<30%，已启用极简输出模式"
      medium:
        default_tier: "L2"
        add_notice: false
  
  # 任务类型映射
  task_type_mapping:
    quick_check: "L1"         # 快速检查
    status_update: "L2"       # 状态更新
    problem_diagnosis: "L2"   # 问题诊断
    deep_analysis: "L3"       # 深度分析
    strategic_decision: "L3"  # 战略决策
    daily_report: "L2"        # 日报
    weekly_review: "L3"       # 周报
    emergency_response: "L1"  # 应急响应

# ==================== 模板库配置 ====================
templates:
  # 任务完成模板
  task_completion:
    L1: "✅ {{task_name}}已完成。{{action_advice}}。"
    L2: |
      ## 摘要
      完成{{task_name}}，{{core_result}}。
      
      ## 关键发现
      {{#findings}}
      - {{.}}
      {{/findings}}
      
      ## 下一步
      {{#next_steps}}
      {{index}}. {{action}} - {{time}}
      {{/next_steps}}
    L3: |
      # {{task_name}}执行报告
      
      ## 执行摘要
      {{executive_summary}}
      
      ## 执行过程
      {{execution_process}}
      
      ## 结果数据
      {{results_data}}
      
      ## 遇到的问题与解决
      {{problems_and_solutions}}
      
      ## 后续建议
      {{follow_up_recommendations}}
  
  # 问题诊断模板
  problem_diagnosis:
    L1: "⚠️ 发现{{problem_type}}。原因：{{root_cause_brief}}。建议：{{single_action}}。"
    L2: |
      ## 问题摘要
      {{problem_summary}}，影响{{impact_scope}}。
      
      ## 根因分析
      - **直接原因**: {{direct_cause}}
      - **深层原因**: {{deep_cause}}
      
      ## 解决方案
      1. **立即措施**: {{immediate_action}}
      2. **根本解决**: {{long_term_solution}}
    L3: |
      # {{problem_name}}诊断报告
      
      ## 问题描述
      {{problem_description}}
      
      ## 影响评估
      | 维度 | 影响程度 | 说明 |
      |------|----------|------|
      {{#impact_assessment}}
      | {{dimension}} | {{severity}} | {{description}} |
      {{/impact_assessment}}
      
      ## 根因分析
      ### 5 Whys
      {{#five_why}}
      {{number}}. {{question}}
      {{/five_why}}
      
      ## 解决方案对比
      {{solution_comparison}}
      
      ## 推荐方案与执行计划
      {{recommendation_and_plan}}
  
  # 数据分析模板
  data_analysis:
    L1: "📊 {{data_overview}}。关键发现：{{key_finding}}。建议：{{recommendation}}。"
    L2: |
      ## 数据概览
      {{overview}}
      
      ## 关键指标
      {{#key_metrics}}
      - {{name}}: {{value}} ({{change}})
      {{/key_metrics}}
      
      ## 趋势洞察
      {{trend_insights}}
      
      ## 行动建议
      {{#recommendations}}
      {{index}}. {{advice}}
      {{/recommendations}}
    L3: |
      # 数据分析报告
      
      ## 数据来源与方法
      {{methodology}}
      
      ## 详细分析
      {{#dimensions}}
      ### {{name}}
      {{analysis}}
      {{/dimensions}}
      
      ## 统计分析
      {{statistical_analysis}}
      
      ## 可视化描述
      {{visualization_description}}
      
      ## 洞察与建议
      {{insights_and_recommendations}}
  
  # 通用响应模板
  general_response:
    L1: "{{conclusion}} {{action_item}}"
    L2: |
      ## 摘要
      {{summary}}
      
      ## 关键发现
      {{#findings}}
      - {{.}}
      {{/findings}}
      
      ## 下一步
      {{#next_steps}}
      {{index}}. {{step}}
      {{/next_steps}}
    L3: |
      # {{title}}
      
      ## 执行摘要
      {{executive_summary}}
      
      ## 背景与上下文
      {{background}}
      
      ## 详细分析
      {{detailed_analysis}}
      
      ## 证据与数据
      {{evidence}}
      
      ## 可选方案
      {{options}}
      
      ## 推荐方案
      {{recommendation}}
      
      ## 执行计划
      {{action_plan}}

# ==================== 展开机制配置 ====================
expand_mechanism:
  enabled: true
  show_in_tiers: ["L1", "L2"]
  expand_commands:
    - "/expand"
    - "/详细"
    - "/展开"
  prompt_message: |
    
    ---
    💡 **需要更详细的信息？**
    - 回复 "/expand" 查看完整分析
    - 回复 "/detail" 获取L3详细版
  
  # 历史记录保留
  retention:
    keep_full_version: true      # 保留完整版
    retention_hours: 24          # 保留24小时
    max_cached_responses: 100    # 最大缓存数

# ==================== 用户偏好学习配置 ====================
user_preference:
  learning_enabled: true
  
  # 学习维度
  learning_dimensions:
    - default_tier_preference    # 默认偏好级别
    - task_type_mapping          # 任务类型映射
    - time_based_preference      # 时间模式
    - feedback_adjustment        # 反馈调整
  
  # 自适应规则
  adaptation_rules:
    consecutive_manual_selection:
      threshold: 3              # 连续3次手动选择
      action: "update_default"
    
    feedback_too_verbose:
      threshold: 2              # 2次"太详细"反馈
      action: "downgrade_tier"
    
    feedback_too_brief:
      threshold: 2              # 2次追问"还有呢"
      action: "upgrade_tier"
  
  # 时间模式
  time_patterns:
    night_hours: [22, 23, 0, 1, 2, 3, 4, 5, 6, 7]  # 深夜偏好L1
    night_default_tier: "L1"

# ==================== 质量控制配置 ====================
quality_control:
  enabled: true
  
  # 完整性检查
  completeness_check:
    L1:
      required_elements: ["conclusion", "action"]
    L2:
      required_elements: ["summary", "findings", "next_steps"]
    L3:
      required_elements: ["summary", "analysis", "evidence", "recommendation"]
  
  # Token溢出处理
  token_overflow:
    strategy: "truncate"        # truncate/summarize/abort
    preserve_sections: ["conclusion", "summary"]  # 优先保留
  
  # 格式验证
  format_validation:
    check_markdown_syntax: true
    check_header_levels: true
    check_table_format: true

# ==================== 性能配置 ====================
performance:
  # 响应时间限制（毫秒）
  response_time_limits:
    L1: 1000
    L2: 3000
    L3: 10000
  
  # 提前终止
  early_termination:
    enabled: true
    check_interval: 100  # 每100ms检查一次
  
  # 缓存
  caching:
    enabled: true
    ttl_seconds: 300     # 5分钟缓存

# ==================== 日志与监控配置 ====================
logging:
  level: "INFO"           # DEBUG/INFO/WARNING/ERROR
  log_tier_selection: true
  log_token_usage: true
  log_user_feedback: true
  
  metrics:
    - tier_distribution      # 各级别使用分布
    - token_savings_rate     # Token节省率
    - response_time_by_tier  # 各级别响应时间
    - expand_request_rate    # 展开请求率
    - user_satisfaction      # 用户满意度

# ==================== 测试用例配置 ====================
test_cases:
  # 测试用例1: 任务完成
  - name: "task_completion_test"
    input: "检查今天的任务完成情况"
    priority: "P2"
    expected_tiers:
      L1: "✅ 今日任务已完成。建议：确认明日计划。"
      L2: "## 摘要\n完成今日任务，进度100%。\n\n## 关键发现\n- 代码审查: 5个PR\n- 文档更新: 完成\n- 会议: 2场\n\n## 下一步\n1. 明日计划确认 - 今晚"
  
  # 测试用例2: 问题诊断
  - name: "problem_diagnosis_test"
    input: "分析系统性能问题"
    priority: "P1"
    expected_tiers:
      L1: "⚠️ 发现性能瓶颈。原因：数据库查询慢。建议：优化索引。"
  
  # 测试用例3: 数据分析
  - name: "data_analysis_test"
    input: "分析本周销售数据"
    priority: "P2"
    expected_tiers:
      L1: "📊 本周销售增长15%。关键发现：新品类表现优异。建议：增加库存。"
  
  # 测试用例4: Token预算低
  - name: "low_budget_test"
    input: "检查邮件"
    token_budget: 25
    expected_tier: "L1"
  
  # 测试用例5: 用户指定详细
  - name: "user_detail_request"
    input: "/detail 分析市场竞争格局"
    expected_tier: "L3"

# ==================== 集成配置 ====================
integration:
  # 与优先级系统集成
  priority_system:
    enabled: true
    priority_key: "priority"
  
  # 与Token预算系统集成
  token_budget_system:
    enabled: true
    budget_key: "token_budget_remaining"
  
  # 与记忆系统集成
  memory_system:
    enabled: true
    preference_key: "user_output_preference"
  
  # 指令解析
  command_parser:
    case_sensitive: false
    allow_prefix: ["/", "!", "#"]

# ==================== 扩展配置 ====================
extensions:
  # 自定义模板路径
  custom_template_path: "skills/tiered-output/custom_templates/"
  
  # 插件支持
  plugins:
    enabled: false
    plugin_directory: "skills/tiered-output/plugins/"
