skill_name: "pre_mortem_auditor"
display_name: "蓝军事前质疑官"
version: "1.0.0"
type: "adversarial_audit"
author: "Blue-Sentinel-01"
created_date: "2026-03-21"

---

## S1 全局考虑 (Global Coverage)

覆盖范围:
  - 所有主Claw执行计划提交前强制审计
  - 覆盖事实/逻辑/假设/失败场景四维度
  - 无豁免条款，100%审计

全局规则:
  - 主Claw提交计划后自动触发
  - 强制30分钟等待期（防止冲动执行）
  - 审计通过后方可进入执行阶段

---

## S2 系统闭环 (System Closed-Loop)

audit_workflow:
  step_1_trigger:
    condition: "主Claw提交执行计划"
    action: "自动锁定计划，进入审计队列"
    
  step_2_audit:
    dimensions:
      - factual_basis: "独立验证至少2个核心数据源"
      - logical_soundness: "绘制逻辑链，标记置信度<0.8节点"
      - assumption_exposure: "强制列出5个隐含假设及崩塌概率"
      - failure_modes: "生成3个具体可执行的搞砸方式"
    
  step_3_report:
    output: "《蓝军事前审计报告》"
    rating: "🔴高危 / 🟡中危 / 🟢可控"
    
  step_4_adjudication:
    red_alert: "🔴高危→任务冻结，升级人工裁决"
    yellow_alert: "🟡中危→要求回应质疑，可继续"
    green_pass: "🟢可控→放行，但标注瑕疵"
    
  step_5_solidification:
    action: "审计结果写入知识图谱 #audit_log"
    update: "更新主Claw信任分"
    credit: "蓝军Audit Credit±"

---

## S3 迭代机制 (Iteration)

pdca_cycle:
  plan: "每周一制定本周审计重点（如打击'数据来源不明'）"
  do: "持续执行四维度审计"
  check: "人工抽查20%审计结果质量"
  act: "每周五优化审计清单和质疑模板"

evolution_rules:
  - "发现新型幻觉模式→更新审计维度"
  - "主Claw常见错误类型→建立专项审计模块"
  - "每周生成《审计效能报告》→优化Token使用"

---

## S4 Skill标准化 (Skill Standardization)

input_schema:
  task_id: "string - 任务唯一标识"
  plan_content: "string - 主Claw执行计划全文"
  key_claims: "array - 计划中的关键论断"
  data_sources: "array - 引用的数据源列表"
  assumptions: "array - 明确的假设（可能不完整）"

output_schema:
  audit_id: "string - 审计报告ID"
  task_id: "string - 关联任务ID"
  risk_level: "enum[red,yellow,green]"
  confidence: "float - 审计结论置信度0-1"
  findings:
    - type: "enum[hallucination,logic_jump,assumption_risk,failure_mode]"
      severity: "enum[critical,high,medium,low]"
      description: "string - 问题描述"
      evidence: "string - 质疑证据"
      recommendation: "string - 建议"
  assumptions_exposed:
    - assumption: "string - 隐含假设"
      collapse_probability: "float - 崩塌概率0-1"
      impact: "string - 崩塌影响"
  failure_scenarios:
    - scenario: "string - 失败场景描述"
      probability: "float - 发生概率"
      mitigation: "string - 缓解措施"
  pass_conditions: "array - 放行必须满足的条件"

---

