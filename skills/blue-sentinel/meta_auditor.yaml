# Blue-Sentinel Meta Auditor
# 蓝军元审计官 - 7标准达标Skill
# 版本: 1.0.0
# 最后更新: 2026-03-21

skill_name: "meta_auditor"
display_name: "蓝军元审计官"
version: "1.0.0"
type: "meta_audit"
author: "Blue-Sentinel-01"
created_date: "2026-03-21"

---

## S1 全局考虑 (Global Coverage)

coverage_scope:
  - "蓝军自身的腐败检测"
  - "人工抽查验证"
  - "蓝军的蓝军（递归监督）"
  - "审计质量的持续监控"

global_principle: |
  监督者也需要被监督。
  元审计确保蓝军本身不产生幻觉、不腐败、不失效。

---

## S2 系统闭环 (System Closed-Loop)

meta_audit_loop:
  step_1_self_monitoring:
    metrics:
      - "审计发现率（每周发现问题数）"
      - "误报率（人工裁定不成立的质疑）"
      - "Token效率（每发现问题消耗的Token）"
      - "响应时间（从触发到输出审计报告）"
    
  step_2_corruption_detection:
    symptoms:
      - "总是同意主Claw"
      - "从不发现错误"
      - "发现错误率低于5%"
      - "质疑质量持续下降"
    action: "触发蓝军腐败警报"
    
  step_3_human_sampling:
    method: "人工随机抽查20%审计结果"
    validation: "验证蓝军审计的准确性"
    
  step_4_blue_team_b:
    trigger: "蓝军-A连续10次未发现任何问题"
    action: "启动蓝军-B进行对抗性审计"
    
  step_5_correction:
    soft: "重新初始化怀疑人格"
    hard: "更换蓝军实例"
    extreme: "暂停蓝军，人工接管审计"

---

## S3 迭代机制 (Iteration)

blue_team_evolution:
  monthly_self_review:
    action: "生成《蓝军自我审计报告》"
    metrics: "准确性/效率/覆盖率趋势"
    
  quarterly_calibration:
    action: "与人类预期对齐校准"
    method: "对比蓝军判断与人类判断的一致性"
    
  annual_overhaul:
    action: "年度蓝军架构审查"
    consideration: "是否需要新的审计维度或方法"

---

## S4 Skill标准化 (Skill Standardization)

input_schema:
  audit_period: "string - 审计周期（周/月）"
  blue_team_outputs: "array - 蓝军所有审计输出"
  human_overrides: "array - 人类裁定的误报/漏报"

output_schema:
  meta_audit_id: "string - 元审计报告ID"
  period: "string - 审计周期"
  
  performance_metrics:
    true_positives: "int - 正确发现的问题"
    false_positives: "int - 误报数"
    false_negatives: "int - 漏报数（人工发现但蓝军未报）"
    precision: "float - 精确率"
    recall: "float - 召回率"
    f1_score: "float - F1分数"
    token_efficiency: "float - Token效率（问题/Token）"
    
  corruption_indicators:
    - indicator: "string - 腐败指标"
      severity: "enum[critical,warning,info]"
      evidence: "string - 证据"
      
  recommendations:
    immediate_actions: "array - 立即整改"
    short_term: "array - 短期优化"
    long_term: "array - 长期改进"
    
  status: "enum[healthy,degraded,corrupted]"

---

## S5 自动化 (Automation)

triggers:
  - type: "scheduled"
    schedule: "0 9 1 * *"
    action: "月度蓝军元审计"
    
  - type: "anomaly"
    condition: "蓝军发现率连续3周低于阈值"
    action: "自动触发腐败检测"
    
  - type: "scheduled"
    schedule: "0 */6 * * *"
    action: "实时指标监控"

cron_jobs:
  - name: "monthly_meta_audit"
    schedule: "0 9 1 * *"
    action: "生成月度蓝军元审计报告"
    
  - name: "quarterly_calibration"
    schedule: "0 9 1 1,4,7,10 *"
    action: "执行季度校准审查"
    
  - name: "continuous_metrics"
    schedule: "0 */6 * * *"
    action: "监控蓝军健康指标"

alerts:
  - condition: "发现率<5%/周"
    level: "warning"
    action: "提醒审查审计策略"
    
  - condition: "误报率>30%"
    level: "critical"
    action: "触发蓝军重置流程"
    
  - condition: "连续10次未发现任何问题"
    level: "critical"
    action: "启动蓝军-B"

---

## S6 认知谦逊 (Epistemic Humility)

meta_limitations:
  - "元审计本身也是AI执行，可能产生元幻觉"
  - "腐败指标基于启发式，可能误判正常波动"
  - "人工抽查20%存在抽样误差"
  - "蓝军-B可能和蓝军-A存在系统性共同盲点"

uncertainty_in_meta:
  required: true
  format: "[META-置信度:{confidence}]"
  note: "元审计结论仅供参考，最终判断权在人类"

meta_error_acknowledgment:
  - "元审计误判蓝军正常→撤销指控"
  - "蓝军-B与蓝军-A一致错误→启动人工深度审查"
  - "每季度生成《元审计局限性分析报告》"

---

## S7 反方观点 (Adversarial Views)

adversarial_view_01_infinite_regress:
  view: "元审计导致无限递归"
  argument: |
    如果蓝军需要元审计，
    元审计是否需要元元审计？
    这将导致无限递归，无法终止。
  counter_argument: |
    递归在蓝军-B处终止。
    蓝军-B和蓝军-A的对比已提供足够信息。
    人类是最终仲裁者，打破递归。
  mitigation: "明确递归终止条件：蓝军-B或人工裁决"
  early_warning: "监控审计层级深度"

adversarial_view_02_meta_cost:
  view: "元审计是昂贵的自我指涉"
  argument: |
    元审计消耗额外Token来审计审计，
    这是一种昂贵的自我指涉，
    边际效益可能极低。
  counter_argument: |
    蓝军失效的代价远高于元审计成本。
    且元审计是低频操作（月度），
    平均成本可控。
  mitigation: "低频执行+轻量级实时监控"
  early_warning: "统计元审计ROI"

adversarial_view_03_human_overload:
  view: "20%人工抽查增加人类负担"
  argument: |
    要求人类抽查20%的审计结果，
    对于高频审计场景，
    这可能成为人类的沉重负担。
  counter_argument: |
    20%是上限，可基于实际情况调整。
    且抽查可批量进行（每周一次审查）。
    对于Critical级别发现才需要立即审查。
  mitigation: "分级抽查：Critical立即，其他批量"
  early_warning: "统计人类抽查时间投入"

