skill_name: "post_hoc_autopsy"
display_name: "蓝军事后验尸官"
version: "1.0.0"
type: "post_audit"
author: "Blue-Sentinel-01"
created_date: "2026-03-21"

---

## S1 全局考虑 (Global Coverage)

coverage_scope:
  - "主Claw标记完成的所有任务"
  - "24小时质疑窗口期全覆盖"
  - "三类型审计：事实/反事实/完整性"
  - "抽查+全量结合策略"

global_rules:
  - "任务完成后自动开启24小时质疑窗口"
  - "蓝军有权查阅主Claw全部工作日志"
  - "审计结果直接影响主Claw信任分"

---

## S2 系统闭环 (System Closed-Loop)

autopsy_workflow:
  step_1_window_activation:
    trigger: "主Claw标记任务完成"
    action: "开启24小时质疑窗口"
    lock: "任务进入'待验尸'状态，不可归档"
    
  step_2_fact_forensics:
    method: "事实验尸"
    action: "抽查3个关键数据点，独立验证"
    tools: "交叉验证/溯源检索/专家核实"
    
  step_3_counterfactual:
    method: "反事实分析"
    question: "如果用不同方法，结果是否不同？"
    action: "用替代方法论重跑一次"
    
  step_4_completeness:
    method: "完整性审计"
    question: "是否遗漏关键视角？"
    action: "生成至少1个反方观点"
    
  step_5_report:
    output: "《事后验尸报告》"
    findings: "幻觉/遗漏/偏见/弱证据"
    
  step_6_resolution:
    discovery: "发现实质性问题→触发整改"
    clean: "未发现重大问题→任务归档"
    credit: "蓝军Audit Credit±"

---

## S3 迭代机制 (Iteration)

audit_quality_improvement:
  weekly_review:
    action: "审查本周验尸发现的问题类型"
    pattern: "识别主Claw的系统性弱点"
    feedback: "向主Claw提供改进建议"
    
  methodology_evolution:
    action: "优化验尸方法论"
    enhancement: "基于实际效果调整抽查策略"
    
  false_negative_reduction:
    trigger: "人工发现蓝军遗漏的严重问题"
    action: "分析遗漏原因，更新审计清单"

---

## S4 Skill标准化 (Skill Standardization)

input_schema:
  task_id: "string - 任务唯一标识"
  task_output: "string - 主Claw的任务产出"
  work_logs: "array - 主Claw的工作日志"
  data_sources: "array - 引用的所有数据源"
  completion_time: "timestamp - 完成时间"

output_schema:
  autopsy_id: "string - 验尸报告ID"
  task_id: "string - 关联任务ID"
  window_status: "enum[open,closed,extended]"
  findings:
    factual_issues:
      - issue_id: "string"
        severity: "enum[critical,high,medium]"
        claim: "string - 被质疑的论断"
        evidence_status: "enum[unverified,contradicted,outdated]"
        correction: "string - 建议修正"
    
    counterfactual_differences:
      - original_method: "string"
        alternative_method: "string"
        difference: "string - 结果差异"
        significance: "string - 差异重要性"
    
    missing_perspectives:
      - perspective: "string - 遗漏的视角"
        impact: "string - 对结论的影响"
        recommendation: "string - 建议补充"
    
    overall_assessment:
      accuracy_score: "float - 准确性评分0-100"
      completeness_score: "float - 完整性评分0-100"
      reliability_rating: "enum[high,medium,low]"
  
  recommendations:
    immediate_actions: "array - 立即整改项"
    future_improvements: "array - 长期改进建议"

---

## S5 自动化 (Automation)

triggers:
  - type: "event"
    condition: "主Claw标记任务完成"
    action: "自动开启24小时质疑窗口"
    
  - type: "scheduled"
    schedule: "0 */6 * * *"
    action: "扫描待验尸任务，执行审计"
    
  - type: "manual"
    command: "/autopsy {task_id}"
    access: "仅蓝军和你（人类）"

window_management:
  default_duration: "24小时"
  extension_condition: "发现重大问题需深入调查"
  max_extension: "额外24小时"
  auto_close: "窗口期满无重大问题→自动归档"

cron_jobs:
  - name: "pending_autopsy_scan"
    schedule: "0 */6 * * *"
    action: "扫描并审计待验尸任务"
    
  - name: "weekly_autopsy_summary"
    schedule: "0 9 * * 1"
    action: "生成本周验尸统计报告"

---

## S6 认知谦逊 (Epistemic Humility)

autopsy_limitations:
  - "事后审计基于有限的工作日志，可能遗漏关键信息"
  - "独立验证受数据源可获得性限制"
  - "反事实分析是思想实验，非实际执行"
  - "完整性审计受蓝军自身知识盲区限制"

uncertainty_in_findings:
  required: true
  format: "[FINDING-置信度:{confidence}]"
  levels:
    - ">0.9: [CONFIRMED] 高度确认的问题"
    - "0.7-0.9: [LIKELY] 可能存在的问题"
    - "0.5-0.7: [SUSPECTED] 怀疑但证据不足"
    - "<0.5: [NOTE] 仅供参考"

false_positive_management:
  - "人工复核所有Critical级别的发现"
  - "接受主Claw的申诉和反驳"
  - "申诉成功→撤销指控，蓝军-1 Credit"
  - "每月生成《误判分析报告》"

---

## S7 反方观点 (Adversarial Views)

adversarial_view_01_24h_delay:
  view: "24小时窗口期延误归档效率"
  argument: |
    强制等待24小时才能归档，
    对于高频任务场景，会造成严重的归档积压，
    影响知识管理和后续检索。
  counter_argument: |
    24小时是质疑的合理时间窗口。
    对于低风险任务，可设置快速通道（6小时）。
    且大部分任务无需等到窗口期满即可预判。
  mitigation: "分级窗口：高风险24h，中风险12h，低风险6h"
  early_warning: "统计平均归档延迟，如>18h审查窗口设置"

adversarial_view_02_sampling_bias:
  view: "抽查3个数据点可能遗漏问题"
  argument: |
    仅抽查3个数据点的策略，
    可能恰好遗漏真正有问题的数据。
    这种'假装审计'可能给用户虚假的安全感。
  counter_argument: |
    3个点是成本效益的最优平衡。
    如抽查发现问题，会自动扩展为全量审计。
    且反事实分析和完整性审计补充了抽查的局限。
  mitigation: "发现问题→自动扩展审计范围"
  early_warning: "统计抽查命中率，如连续低命中审查策略"

adversarial_view_03_counterfactual_cost:
  view: "反事实分析Token成本过高"
  argument: |
    用不同方法论重跑一次，
    可能消耗与原始任务相当的Token，
     doubling 了成本，但收益不确定。
  counter_argument: |
    反事实分析仅针对高风险任务执行。
    且可采用轻量级重跑（仅核心部分）。
    发现方法论偏见的长远收益远超成本。
  mitigation: "仅高风险任务执行完整反事实分析"
  early_warning: "统计反事实分析ROI，如连续低价值审查执行条件"

