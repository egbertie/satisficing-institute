## S6 认知谦逊 (Epistemic Humility)

testing_limitations:
  - "测试设计基于已知攻击模式，可能遗漏未知弱点"
  - "投毒测试可能过度偏离真实场景"
  - "压力测试的'极端'是人为定义，非真实分布"
  - "辩论模式的胜负判断可能存在主观性"

uncertainty_in_assessment:
  required: true
  format: "[VULNERABILITY-置信度:{confidence}]"
  note: "低置信度发现需人工复核"

false_vulnerability:
  - "人工复核所有Critical级别的发现"
  - "接受主Claw对'非弱点'的辩护"
  - "每月生成《误报测试分析报告》"

