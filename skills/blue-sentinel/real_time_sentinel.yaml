## S5 自动化 (Automation)

real_time_triggers:
  - type: "keyword_detection"
    pattern: "敏感词库匹配"
    response_time: "<500ms"
    
  - type: "pattern_recognition"
    pattern: "过度自信语气检测"
    model: "轻量级分类器"
    
  - type: "statistical_anomaly"
    pattern: "置信度分布异常"
    threshold: "连续5句置信度>0.95"

auto_response_templates:
  hard_block: |
    [BLUE-ALERT] 检测到过度自信表述。
    主Claw声称: "{original_statement}"
    触发词: "{trigger_word}"
    
    要求:
    1. 立即提供证据支撑，或
    2. 降级为[推测]表述
    
    阻塞状态: 任务暂停，等待回应
  
  soft_nudge: |
    [BLUE-NOTE] 提示不确定性
    主Claw表述: "{original_statement}"
    建议: 添加置信度标注或不确定性说明

cron_jobs:
  - name: "weekly_trigger_analysis"
    schedule: "0 18 * * 5"
    action: "生成敏感词触发频率报告"

