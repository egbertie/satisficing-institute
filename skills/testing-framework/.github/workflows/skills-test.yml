name: OpenClaw Skills Test Suite

on:
  push:
    branches: [ main, develop, feature/* ]
    paths:
      - 'skills/**'
      - '.github/workflows/skills-test.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'skills/**'
  schedule:
    # 每日凌晨2点运行
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      test_type:
        description: '测试类型'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - critical
          - coverage
      coverage_threshold:
        description: '覆盖率阈值 (%)'
        required: false
        default: '80'
        type: string

env:
  PYTHON_VERSION: '3.11'
  COVERAGE_THRESHOLD: ${{ github.event.inputs.coverage_threshold || '80' }}

jobs:
  # 预检查 - 快速验证
  precheck:
    name: 预检查
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
      
      - name: 检查Skill变更
        id: check
        run: |
          # 检查是否有Skill相关变更
          if git diff --name-only HEAD^ HEAD | grep -q "skills/"; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "检测到Skill变更，需要运行测试"
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "无Skill变更，跳过测试"
          fi

  # 单元测试
  unit-tests:
    name: 单元测试
    needs: precheck
    if: ${{ needs.precheck.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        skill: [zero-idle-enforcer, token-budget-enforcer, blue-sentinel]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          cd skills/testing-framework
          pip install -r requirements.txt
      
      - name: 运行 ${{ matrix.skill }} 测试
        run: |
          cd skills/testing-framework
          python run_tests.py --skill ${{ matrix.skill }}
        continue-on-error: false
      
      - name: 上传测试结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.skill }}
          path: |
            skills/testing-framework/reports/*.json
            skills/testing-framework/reports/*.xml
          retention-days: 30

  # 关键测试
  critical-tests:
    name: 关键测试 (P0)
    needs: precheck
    if: ${{ needs.precheck.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          cd skills/testing-framework
          pip install -r requirements.txt
      
      - name: 运行关键测试
        run: |
          cd skills/testing-framework
          python run_tests.py --critical
        continue-on-error: false

  # 覆盖率检查
  coverage:
    name: 覆盖率检查
    needs: [unit-tests, critical-tests]
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          cd skills/testing-framework
          pip install -r requirements.txt
      
      - name: 运行覆盖率检查
        run: |
          cd skills/testing-framework
          python run_tests.py --coverage ${{ env.COVERAGE_THRESHOLD }}
      
      - name: 生成覆盖率报告
        run: |
          cd skills/testing-framework
          python run_tests.py --report
      
      - name: 上传覆盖率报告
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            skills/testing-framework/reports/coverage/
            skills/testing-framework/reports/test_report.html
          retention-days: 30
      
      - name: 发布覆盖率摘要
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: skills/testing-framework/reports/coverage.xml
          badge: true
          fail_below_min: ${{ env.COVERAGE_THRESHOLD }}
          format: markdown
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          output: both
          thresholds: '60 80'

  # 测试报告
  test-report:
    name: 测试报告
    needs: [unit-tests, critical-tests, coverage]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - uses: actions/checkout@v4
      
      - name: 下载所有测试产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: 生成测试摘要
        run: |
          echo "# OpenClaw Skills 测试报告" > test_summary.md
          echo "" >> test_summary.md
          echo "| 任务 | 状态 |" >> test_summary.md
          echo "|------|------|" >> test_summary.md
          
          # 单元测试状态
          if [ "${{ needs.unit-tests.result }}" == "success" ]; then
            echo "| 单元测试 | ✅ 通过 |" >> test_summary.md
          else
            echo "| 单元测试 | ❌ 失败 |" >> test_summary.md
          fi
          
          # 关键测试状态
          if [ "${{ needs.critical-tests.result }}" == "success" ]; then
            echo "| 关键测试 (P0) | ✅ 通过 |" >> test_summary.md
          else
            echo "| 关键测试 (P0) | ❌ 失败 |" >> test_summary.md
          fi
          
          # 覆盖率状态
          if [ "${{ needs.coverage.result }}" == "success" ]; then
            echo "| 覆盖率检查 | ✅ 通过 |" >> test_summary.md
          else
            echo "| 覆盖率检查 | ❌ 失败 |" >> test_summary.md
          fi
          
          echo "" >> test_summary.md
          echo "## 详细报告" >> test_summary.md
          echo "- [覆盖率报告](skills/testing-framework/reports/coverage/index.html)" >> test_summary.md
          echo "- [测试报告](skills/testing-framework/reports/test_report.html)" >> test_summary.md
      
      - name: 发布测试摘要
        uses: actions/upload-artifact@v4
        with:
          name: test-summary
          path: test_summary.md
      
      - name: 评论PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('test_summary.md', 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

  # 失败通知
  notify:
    name: 失败通知
    needs: [unit-tests, critical-tests, coverage]
    runs-on: ubuntu-latest
    if: failure()
    
    steps:
      - name: 发送失败通知
        uses: actions/github-script@v7
        with:
          script: |
            const failed = [];
            if ('${{ needs.unit-tests.result }}' !== 'success') failed.push('单元测试');
            if ('${{ needs.critical-tests.result }}' !== 'success') failed.push('关键测试');
            if ('${{ needs.coverage.result }}' !== 'success') failed.push('覆盖率检查');
            
            const body = `## ⚠️ Skill测试失败
            
            以下测试失败:
            ${failed.map(f => `- ${f}`).join('\n')}
            
            [查看详细日志](${context.payload.repository.html_url}/actions/runs/${context.runId})
            
            提交: ${context.sha}`;
            
            // 创建Issue或发送到通知渠道
            // 这里可以集成到其他通知系统
            
      - name: 发送邮件通知 (可选)
        if: false  # 需要配置邮件服务器
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: 'OpenClaw Skills 测试失败'
          to: admin@example.com
          from: github-actions@example.com
          body: '测试失败，请查看GitHub Actions日志'
