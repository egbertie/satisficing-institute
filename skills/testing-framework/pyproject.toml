[tool.pytest.ini_options]
minversion = "7.0"
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--strict-markers",
    "--strict-config",
    "--verbose",
    "--tb=short",
    "-ra",
    "--cov=skills",
    "--cov-report=term-missing",
    "--cov-report=html:reports/coverage",
    "--cov-report=xml:reports/coverage.xml",
    "--html=reports/test_report.html",
    "--self-contained-html",
]
markers = [
    "unit: Unit tests (fast, isolated)",
    "integration: Integration tests (slower, cross-component)",
    "e2e: End-to-end tests (full system)",
    "slow: Slow tests (>1s)",
    "critical: Critical path tests (always run)",
    "zero_idle: zero-idle-enforcer tests",
    "token_budget: token-budget-enforcer tests",
    "blue_sentinel: blue-sentinel tests",
]
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]

[tool.coverage.run]
source = ["skills"]
omit = [
    "*/tests/*",
    "*/test_*",
    "*/__pycache__/*",
    "*/.archive_*/*",
]
data_file = "reports/.coverage"

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
]
fail_under = 80
show_missing = true
skip_covered = false

[tool.coverage.html]
directory = "reports/coverage"
title = "OpenClaw Skills Test Coverage"

[tool.coverage.xml]
output = "reports/coverage.xml"
