# pytest configuration file
# 使用 pyproject.toml 作为主要配置
# 此文件用于兼容旧版本pytest

[pytest]
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts = 
    --strict-markers
    --strict-config
    --verbose
    --tb=short
    -ra

markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, cross-component)
    e2e: End-to-end tests (full system)
    slow: Slow tests (>1s)
    critical: Critical path tests (always run)
    zero_idle: zero-idle-enforcer tests
    token_budget: token-budget-enforcer tests
    blue_sentinel: blue-sentinel tests

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
