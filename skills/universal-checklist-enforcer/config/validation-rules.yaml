# 清单验证规则
# Validation Rules for Checklist Templates

validation_rules:
  # 结构验证
  structure:
    - name: 模板必须有版本号
      check: template.version exists and template.version != ""
      severity: error
      message: "模板缺少版本号"
      
    - name: 模板必须有描述
      check: template.description exists and template.description != ""
      severity: warning
      message: "模板缺少描述"
      
    - name: 检查项数组不为空
      check: template.items exists and len(template.items) > 0
      severity: error
      message: "检查项列表为空"

  # 字段验证
  item_fields:
    required:
      - id
      - name
      - description
      - criteria
    optional:
      - block_on_fail
      - weight
      - tags
      - help_text
      
  # 约束规则
  constraints:
    - name: ID格式
      pattern: "^[A-Z][0-9]+$"
      example: ["C1", "CR5", "D12"]
      severity: error
      message: "检查项ID必须符合格式 [大写字母][数字]"
      
    - name: ID唯一性
      check: all item.id are unique within template
      severity: error
      message: "发现重复的检查项ID"
      
    - name: 权重范围
      min: 0.0
      max: 1.0
      severity: warning
      message: "权重值必须在 0.0-1.0 范围内"
      auto_fix: true
      fix_action: clamp_to_range
      
    - name: 标准不为空
      check: len(item.criteria) > 0
      severity: error
      message: "检查项的标准列表不能为空"
      
    - name: 名称长度
      min_length: 3
      max_length: 100
      severity: warning
      message: "名称长度应在3-100字符之间"
      
    - name: 描述长度
      min_length: 10
      max_length: 500
      severity: warning
      message: "描述长度应在10-500字符之间"

  # 扩展验证
  extension:
    - name: 父模板存在
      check: template.extends exists implies parent_template exists
      severity: error
      message: "继承的父模板不存在"
      
    - name: 扩展不冲突
      check: extended items don't conflict with parent
      severity: warning
      message: "扩展项与父模板项存在冲突"

# 验证通过标准
pass_criteria:
  error_count: 0
  max_warning_count: 5
