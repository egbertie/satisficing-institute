# ============================================================
# 灾备企微通道配置文件
# 企业微信机器人 Webhook 配置
# ============================================================

# 全局配置
settings:
  # 告警级别映射
  severity_levels:
    P0:  # 紧急 - 立即通知
      name: "紧急"
      description: "系统核心功能受损，需要立即处理"
      color: "FF0000"  # 红色
      at_all: true     # @所有人
      priority: 0
    
    P1:  # 高优先级 - 1小时内响应
      name: "高优先级"
      description: "重要功能受影响，需要尽快处理"
      color: "FF8C00"  # 橙色
      at_all: false
      priority: 1
    
    P2:  # 中等优先级 - 4小时内响应
      name: "中等优先级"
      description: "一般问题，按计划处理"
      color: "FFD700"  # 黄色
      at_all: false
      priority: 2
    
    P3:  # 低优先级 - 24小时内响应
      name: "低优先级"
      description: "信息提示，无需立即处理"
      color: "1E90FF"  # 蓝色
      at_all: false
      priority: 3

# Webhook 配置
webhooks:
  # ============================================================
  # ⚠️ 待用户配置：替换为实际的企微机器人 Webhook URL
  # ============================================================
  
  # 系统告警群
  system_alerts:
    name: "系统告警通知群"
    url: "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=YOUR_SYSTEM_ALERT_KEY"
    enabled: true
    default_level: P1
    description: "系统级告警通知（Token耗尽、服务异常等）"
  
  # 灾备通知群
  disaster_recovery:
    name: "灾备通知群"
    url: "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=YOUR_DISASTER_RECOVERY_KEY"
    enabled: true
    default_level: P0
    description: "灾备相关紧急通知（备份失败、恢复流程等）"
  
  # 安全告警群
  security_alerts:
    name: "安全告警群"
    url: "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=YOUR_SECURITY_ALERT_KEY"
    enabled: true
    default_level: P0
    description: "安全相关告警（未授权访问、异常操作等）"
  
  # 任务通知群
  task_notifications:
    name: "任务通知群"
    url: "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=YOUR_TASK_NOTIFICATION_KEY"
    enabled: true
    default_level: P2
    description: "任务执行状态通知（成功/失败/超时）"

# 通知规则
rules:
  # Token 相关告警
  token_alerts:
    - condition: "token_usage > 80%"
      level: P1
      webhook: system_alerts
      template: "token_warning"
    
    - condition: "token_usage > 95%"
      level: P0
      webhook: system_alerts
      template: "token_critical"
  
  # 备份相关告警
  backup_alerts:
    - condition: "backup_failed"
      level: P0
      webhook: disaster_recovery
      template: "backup_failure"
    
    - condition: "backup_success"
      level: P3
      webhook: task_notifications
      template: "backup_success"
  
  # 系统健康告警
  health_alerts:
    - condition: "system_unhealthy"
      level: P0
      webhook: system_alerts
      template: "system_failure"
    
    - condition: "memory_corrupted"
      level: P0
      webhook: disaster_recovery
      template: "memory_failure"
  
  # 安全告警
  security_events:
    - condition: "unauthorized_access"
      level: P0
      webhook: security_alerts
      template: "security_breach"
    
    - condition: "suspicious_activity"
      level: P1
      webhook: security_alerts
      template: "security_warning"

# 通知模板配置
templates:
  # 模板路径
  base_path: "skills/disaster-recovery-wecom/templates"
  
  # 可用模板列表
  available:
    - system_failure
    - token_warning
    - token_critical
    - backup_failure
    - backup_success
    - memory_failure
    - security_breach
    - security_warning
    - task_failure
    - task_success

# 限流配置
rate_limiting:
  # 同一级别通知最小间隔（秒）
  min_interval:
    P0: 60      # 紧急：1分钟
    P1: 300     # 高优先级：5分钟
    P2: 1800    # 中等：30分钟
    P3: 3600    # 低优先级：1小时
  
  # 每小时最大通知数
  max_per_hour:
    P0: 60      # 紧急：无限制
    P1: 20
    P2: 10
    P3: 5

# 重试配置
retry:
  max_attempts: 3
  initial_delay: 5      # 首次重试延迟（秒）
  exponential_backoff: true
  max_delay: 300        # 最大延迟（秒）

# 日志配置
logging:
  enabled: true
  log_path: "skills/disaster-recovery-wecom/logs"
  max_log_files: 30     # 保留30天的日志
  log_level: "INFO"     # DEBUG, INFO, WARN, ERROR

# ============================================================
# 📝 使用说明
# ============================================================
# 
# 1. 获取企微机器人 Webhook Key:
#    - 在企微群聊中，点击右上角「...」→「添加群机器人」
#    - 选择「新建机器人」，输入机器人名称
#    - 复制 Webhook URL 中的 key 参数
#
# 2. 修改配置:
#    - 将上面的 YOUR_*_KEY 替换为实际的 key
#    - 根据需要启用/禁用不同的 webhook
#
# 3. 测试配置:
#    ./scripts/emergency-wecom-alert.sh test "这是一条测试消息"
#
# 4. 查看使用文档:
#    docs/DISASTER_RECOVERY_WECOM_SETUP.md
#
# ============================================================
