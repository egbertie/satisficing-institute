<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
    margin: 0;
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
}
.poster {
    width: 1080px;
    height: 1920px;
    position: relative;
    overflow: hidden;
}

/* 海报2: 个人介绍 */
.poster-2 {
    background: linear-gradient(180deg, #faf8f5 0%, #f5f0e8 100%);
    padding: 100px 80px;
    color: #2c3e50;
}
.poster-2 .header {
    text-align: center;
    margin-bottom: 80px;
}
.poster-2 .brand {
    font-size: 72px;
    color: #8b6914;
    letter-spacing: 16px;
    margin-bottom: 20px;
}
.poster-2 .position {
    font-size: 32px;
    color: #666;
    letter-spacing: 4px;
}
.poster-2 .content {
    display: flex;
    gap: 60px;
    margin-bottom: 80px;
}
.poster-2 .left {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
}
.poster-2 .totem-visual {
    width: 380px;
    height: 380px;
    background: conic-gradient(
        from 0deg,
        #e74c3c 0deg 72deg,
        #d4a574 72deg 144deg,
        #95a5a6 144deg 216deg,
        #27ae60 216deg 288deg,
        #3498db 288deg 360deg
    );
    border-radius: 50%;
    position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
}
.poster-2 .totem-visual::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 200px;
    height: 200px;
    background: #faf8f5;
    border-radius: 50%;
}
.poster-2 .totem-visual::after {
    content: '五路\n图腾';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    font-size: 48px;
    font-weight: bold;
    color: #8b6914;
    line-height: 1.3;
}
.poster-2 .right {
    flex: 1.2;
    padding-top: 40px;
}
.poster-2 .section {
    margin-bottom: 50px;
}
.poster-2 .section-title {
    font-size: 28px;
    color: #8b6914;
    margin-bottom: 20px;
    font-weight: 600;
}
.poster-2 .section-content {
    font-size: 32px;
    line-height: 1.8;
    color: #444;
}
.poster-2 .highlight {
    color: #8b6914;
    font-weight: 600;
}
.poster-2 .footer {
    text-align: center;
    padding: 40px;
    background: #8b6914;
    color: white;
    font-size: 40px;
    letter-spacing: 8px;
    margin: 0 -80px -100px -80px;
}
</style>
</head>
<body>
<div class="poster poster-2">
    <div class="header">
        <div class="brand">满意解研究所</div>
        <div class="position">硬件初创企业家 · 合伙人选择决策教练</div>
    </div>
    
    <div class="content">
        <div class="left">
            <div class="totem-visual"></div>
        </div>
        
        <div class="right">
            <div class="section">
                <div class="section-title">创始人</div>
                <div class="section-content">
                    <span class="highlight">Egbertie</span><br>
                    22年跨界积淀
                </div>
            </div>
            
            <div class="section">
                <div class="section-title">背景</div>
                <div class="section-content">
                    11年银行体系<span class="highlight">风控专家</span><br>
                    11年硬科技<span class="highlight">连续创业</span>
                </div>
            </div>
            
            <div class="section">
                <div class="section-title">方法论</div>
                <div class="section-content">
                    五路图腾决策模型<br>
                    <span style="font-size: 24px; color: #666;">
                        儒商哲学 × 决策科学 × 极限测试<br>
                        × 合伙人伦理 × 压力管理
                    </span>
                </div>
            </div>
        </div>
    </div>
    
    <div class="footer">帮你选对合伙人 · 少踩坑 · 多成事</div>
</div>
</body>
</html>
