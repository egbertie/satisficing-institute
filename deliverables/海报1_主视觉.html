<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
    margin: 0;
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
}
.poster {
    width: 1080px;
    height: 1920px;
    position: relative;
    overflow: hidden;
}

/* 海报1: 主视觉 */
.poster-1 {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    text-align: center;
}
.poster-1 .totem {
    width: 400px;
    height: 400px;
    margin-bottom: 80px;
}
.poster-1 h1 {
    font-size: 120px;
    font-weight: 300;
    letter-spacing: 20px;
    margin-bottom: 40px;
}
.poster-1 .subtitle {
    font-size: 42px;
    color: #e8d5b7;
    margin-bottom: 20px;
    letter-spacing: 8px;
}
.poster-1 .tagline {
    font-size: 36px;
    color: rgba(255,255,255,0.7);
    margin-bottom: 100px;
}
.poster-1 .date {
    font-size: 48px;
    color: #e8d5b7;
    letter-spacing: 12px;
    border: 3px solid #e8d5b7;
    padding: 20px 60px;
}
</style>
</head>
<body>
<div class="poster poster-1">
    <svg class="totem" viewBox="0 0 400 400">
        <circle cx="200" cy="200" r="180" fill="none" stroke="#e8d5b7" stroke-width="2" opacity="0.3"/>
        <circle cx="200" cy="200" r="140" fill="none" stroke="#e8d5b7" stroke-width="2" opacity="0.3"/>
        <circle cx="200" cy="200" r="100" fill="none" stroke="#e8d5b7" stroke-width="2" opacity="0.5"/>
        <circle cx="200" cy="80" r="30" fill="#e74c3c"/>
        <text x="200" y="88" text-anchor="middle" fill="white" font-size="20" font-weight="bold">火</text>
        <circle cx="314" cy="146" r="30" fill="#d4a574"/>
        <text x="314" y="154" text-anchor="middle" fill="white" font-size="20" font-weight="bold">土</text>
        <circle cx="314" cy="254" r="30" fill="#95a5a6"/>
        <text x="314" y="262" text-anchor="middle" fill="white" font-size="20" font-weight="bold">金</text>
        <circle cx="200" cy="320" r="30" fill="#27ae60"/>
        <text x="200" y="328" text-anchor="middle" fill="white" font-size="20" font-weight="bold">木</text>
        <circle cx="86" cy="254" r="30" fill="#3498db"/>
        <text x="86" y="262" text-anchor="middle" fill="white" font-size="20" font-weight="bold">水</text>
        <line x1="200" y1="110" x2="284" y2="146" stroke="#e8d5b7" stroke-width="2" opacity="0.5"/>
        <line x1="314" y1="176" x2="314" y2="224" stroke="#e8d5b7" stroke-width="2" opacity="0.5"/>
        <line x1="284" y1="254" x2="200" y2="290" stroke="#e8d5b7" stroke-width="2" opacity="0.5"/>
        <line x1="170" y1="320" x2="86" y2="284" stroke="#e8d5b7" stroke-width="2" opacity="0.5"/>
        <line x1="86" y1="224" x2="86" y2="176" stroke="#e8d5b7" stroke-width="2" opacity="0.5"/>
        <line x1="116" y1="146" x2="170" y2="110" stroke="#e8d5b7" stroke-width="2" opacity="0.5"/>
        <circle cx="200" cy="200" r="40" fill="#e8d5b7"/>
        <text x="200" y="195" text-anchor="middle" fill="#1a1a2e" font-size="16" font-weight="bold">满意解</text>
        <text x="200" y="212" text-anchor="middle" fill="#1a1a2e" font-size="12">研究所</text>
    </svg>
    <h1>满意解研究所</h1>
    <p class="subtitle">合伙人选择决策教练</p>
    <p class="tagline">22年积淀 · 专注硬件创业</p>
    <p class="date">2026.03.25 正式启航</p>
</div>
</body>
</html>
