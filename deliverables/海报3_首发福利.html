<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
    margin: 0;
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
}
.poster {
    width: 1080px;
    height: 1920px;
    position: relative;
    overflow: hidden;
}

/* 海报3: 首发福利 */
.poster-3 {
    background: linear-gradient(135deg, #c0392b 0%, #8e44ad 50%, #2980b9 100%);
    padding: 100px 80px;
    color: white;
    text-align: center;
}
.poster-3 .badge {
    display: inline-block;
    background: #f1c40f;
    color: #c0392b;
    font-size: 36px;
    font-weight: bold;
    padding: 15px 50px;
    border-radius: 50px;
    margin-bottom: 40px;
    letter-spacing: 4px;
}
.poster-3 h1 {
    font-size: 100px;
    margin-bottom: 30px;
    text-shadow: 0 4px 20px rgba(0,0,0,0.3);
    letter-spacing: 20px;
}
.poster-3 .limit {
    font-size: 48px;
    color: #f1c40f;
    margin-bottom: 80px;
    letter-spacing: 8px;
}
.poster-3 .offer-box {
    background: rgba(255,255,255,0.15);
    border: 3px solid rgba(255,255,255,0.3);
    border-radius: 30px;
    padding: 60px;
    margin-bottom: 60px;
    backdrop-filter: blur(10px);
}
.poster-3 .offer-title {
    font-size: 48px;
    margin-bottom: 30px;
}
.poster-3 .offer-value {
    font-size: 80px;
    color: #f1c40f;
    font-weight: bold;
    margin-bottom: 50px;
}
.poster-3 .offer-items {
    text-align: left;
    font-size: 36px;
    line-height: 2;
}
.poster-3 .offer-items li {
    margin-bottom: 20px;
    list-style: none;
}
.poster-3 .offer-items li::before {
    content: '✓ ';
    color: #f1c40f;
    font-weight: bold;
}
.poster-3 .conditions {
    text-align: left;
    background: rgba(0,0,0,0.2);
    border-radius: 20px;
    padding: 50px;
    margin-bottom: 60px;
}
.poster-3 .conditions h3 {
    font-size: 36px;
    margin-bottom: 30px;
    color: #f1c40f;
}
.poster-3 .conditions ol {
    font-size: 32px;
    line-height: 2;
    padding-left: 40px;
}
.poster-3 .conditions li {
    margin-bottom: 15px;
}
.poster-3 .cta {
    background: #f1c40f;
    color: #c0392b;
    padding: 40px 60px;
    border-radius: 20px;
    font-size: 40px;
    font-weight: bold;
    letter-spacing: 6px;
}
.poster-3 .cta-sub {
    font-size: 28px;
    color: rgba(255,255,255,0.8);
    margin-top: 30px;
}
</style>
</head>
<body>
<div class="poster poster-3">
    <div class="badge">限时免费</div>
    <h1>首发福利</h1>
    <p class="limit">仅限前3位</p>
    
    <div class="offer-box">
        <div class="offer-title">合伙人选择决策咨询</div>
        <div class="offer-value">价值 ¥5,000</div>
        <ul class="offer-items">
            <li>1小时一对一深度咨询</li>
            <li>定制化合伙人评估报告</li>
            <li>3个月微信答疑支持</li>
        </ul>
    </div>
    
    <div class="conditions">
        <h3>报名条件</h3>
        <ol>
            <li>已获得或正在申请政府补贴</li>
            <li>面临合伙人选择困境</li>
            <li>愿意分享脱敏案例</li>
        </ol>
    </div>
    
    <div class="cta">关注公众号 回复「首发福利」</div>
    <p class="cta-sub">搜索「满意解研究所」立即预约 · 名额有限先到先得</p>
</div>
</body>
</html>
