<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1600" width="1200" height="1600">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&amp;family=Noto+Sans+SC:wght@400;500;700&amp;display=swap');
      .title { font-family: 'Noto Serif SC', 'SimSun', serif; font-weight: 700; }
      .subtitle { font-family: 'Noto Sans SC', 'SimHei', sans-serif; font-weight: 400; }
      .totem-name { font-family: 'Noto Sans SC', 'SimHei', sans-serif; font-weight: 700; }
      .element { font-family: 'Noto Sans SC', 'SimHei', sans-serif; font-weight: 500; }
      .spirit { font-family: 'Noto Serif SC', 'SimSun', serif; font-weight: 400; }
      .quote { font-family: 'Noto Serif SC', 'SimSun', serif; font-weight: 400; font-style: italic; }
      .arrow-text { font-family: 'Noto Sans SC', 'SimHei', sans-serif; font-weight: 400; }
    </style>
    
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FAFAFA"/>
      <stop offset="100%" style="stop-color:#F0F0F0"/>
    </linearGradient>
    
    <style>
      .liu-color { fill: #8B7355; }
      .simon-color { fill: #A8A8A8; }
      .guanyin-color { fill: #5B9BD5; }
      .confucius-color { fill: #7BA05B; }
      .huineng-color { fill: #D4574A; }
      .text-dark { fill: #2C3E50; }
      .text-light { fill: #FFFFFF; }
      .line-dark { stroke: #2C3E50; stroke-width: 2; fill: none; }
    </style>
    
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B7355"/>
    </marker>
    <marker id="arrowhead-silver" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#A8A8A8"/>
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5B9BD5"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7BA05B"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#D4574A"/>
    </marker>
  </defs>
  
  <rect width="1200" height="1600" fill="url(#bg-gradient)"/>
  
  <circle cx="600" cy="800" r="450" fill="none" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="8,4"/>
  <circle cx="600" cy="800" r="380" fill="none" stroke="#E8E8E8" stroke-width="1"/>
  
  <text x="600" y="80" text-anchor="middle" class="title" font-size="56" fill="#1A1A1A">五路图腾</text>
  <text x="600" y="130" text-anchor="middle" class="subtitle" font-size="28" fill="#666">五行相生 · 生生不息</text>
  <line x1="500" y1="150" x2="700" y2="150" stroke="#8B7355" stroke-width="2"/>
  
  <g transform="translate(100, 750)">
    <circle cx="100" cy="100" r="90" fill="#8B7355" opacity="0.1"/>
    <circle cx="100" cy="100" r="80" fill="#8B7355"/>
    <path d="M70 60 h60 v80 h-60 z M75 65 v70 M125 65 v70 M75 120 h60" 
          fill="none" stroke="#FFFFFF" stroke-width="3"/>
    <text x="100" y="195" text-anchor="middle" class="totem-name" font-size="22" fill="#2C3E50">LIU</text>
    <text x="100" y="220" text-anchor="middle" class="element" font-size="16" fill="#8B7355">土 · 价值纯度</text>
    <text x="100" y="245" text-anchor="middle" class="spirit" font-size="18" fill="#444">惟吾德馨</text>
  </g>
  
  <g transform="translate(900, 500)">
    <circle cx="100" cy="100" r="90" fill="#C0C0C0" opacity="0.15"/>
    <circle cx="100" cy="100" r="80" fill="#A8A8A8"/>
    <circle cx="70" cy="70" r="8" fill="#FFFFFF"/>
    <circle cx="130" cy="70" r="8" fill="#FFFFFF"/>
    <circle cx="100" cy="100" r="10" fill="#FFFFFF"/>
    <circle cx="70" cy="130" r="8" fill="#FFFFFF"/>
    <circle cx="130" cy="130" r="8" fill="#FFFFFF"/>
    <path d="M70 70 L100 100 L130 70 M70 130 L100 100 L130 130" 
          fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <text x="100" y="195" text-anchor="middle" class="totem-name" font-size="22" fill="#2C3E50">SIMON</text>
    <text x="100" y="220" text-anchor="middle" class="element" font-size="16" fill="#888">金 · 方法论</text>
    <text x="100" y="245" text-anchor="middle" class="spirit" font-size="18" fill="#444">满意解</text>
  </g>
  
  <g transform="translate(500, 1150)">
    <circle cx="100" cy="100" r="90" fill="#5B9BD5" opacity="0.1"/>
    <circle cx="100" cy="100" r="80" fill="#5B9BD5"/>
    <path d="M50 85 Q70 75, 90 85 T130 85 M50 100 Q70 90, 90 100 T130 100 M50 115 Q70 105, 90 115 T130 115" 
          fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
    <text x="100" y="195" text-anchor="middle" class="totem-name" font-size="22" fill="#2C3E50">GUANYIN</text>
    <text x="100" y="220" text-anchor="middle" class="element" font-size="16" fill="#5B9BD5">水 · 决策状态</text>
    <text x="100" y="245" text-anchor="middle" class="spirit" font-size="18" fill="#444">自在从容</text>
  </g>
  
  <g transform="translate(900, 1000)">
    <circle cx="100" cy="100" r="90" fill="#7BA05B" opacity="0.1"/>
    <circle cx="100" cy="100" r="80" fill="#7BA05B"/>
    <path d="M100 140 V60 M85 80 L100 65 L115 80 M85 100 L100 85 L115 100" 
          fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
    <text x="100" y="195" text-anchor="middle" class="totem-name" font-size="22" fill="#2C3E50">CONFUCIUS</text>
    <text x="100" y="220" text-anchor="middle" class="element" font-size="16" fill="#7BA05B">木 · 合伙伦理</text>
    <text x="100" y="245" text-anchor="middle" class="spirit" font-size="18" fill="#444">仁者爱人</text>
  </g>
  
  <g transform="translate(100, 450)">
    <circle cx="100" cy="100" r="90" fill="#D4574A" opacity="0.1"/>
    <circle cx="100" cy="100" r="80" fill="#D4574A"/>
    <path d="M100 50 L110 75 L135 75 L115 90 L125 115 L100 100 L75 115 L85 90 L65 75 L90 75 Z" 
          fill="#FFFFFF" opacity="0.9"/>
    <circle cx="100" cy="85" r="8" fill="#D4574A"/>
    <text x="100" y="195" text-anchor="middle" class="totem-name" font-size="22" fill="#2C3E50">HUINENG</text>
    <text x="100" y="220" text-anchor="middle" class="element" font-size="16" fill="#D4574A">火 · 顿悟直觉</text>
    <text x="100" y="245" text-anchor="middle" class="spirit" font-size="18" fill="#444">知行合一</text>
  </g>
  
  <g transform="translate(500, 650)">
    <circle cx="100" cy="100" r="70" fill="#FFFFFF" stroke="#2C3E50" stroke-width="2"/>
    <circle cx="100" cy="100" r="60" fill="#F8F8F8" stroke="#E0E0E0" stroke-width="1"/>
    <text x="100" y="95" text-anchor="middle" class="subtitle" font-size="14" fill="#888">指挥官</text>
    <text x="100" y="115" text-anchor="middle" class="totem-name" font-size="18" fill="#2C3E50">Egbertie</text>
  </g>
  
  <path d="M280 700 Q450 580, 900 580" fill="none" stroke="#8B7355" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="580" y="560" text-anchor="middle" class="arrow-text" font-size="12" fill="#8B7355">土生金</text>
  
  <path d="M950 750 Q950 950, 650 1180" fill="none" stroke="#A8A8A8" stroke-width="2" marker-end="url(#arrowhead-silver)"/>
  <text x="850" y="980" text-anchor="middle" class="arrow-text" font-size="12" fill="#888">金生水</text>
  
  <path d="M700 1220 Q850 1200, 900 1100" fill="none" stroke="#5B9BD5" stroke-width="2" marker-end="url(#arrowhead-blue)"/>
  <text x="820" y="1230" text-anchor="middle" class="arrow-text" font-size="12" fill="#5B9BD5">水生木</text>
  
  <path d="M900 920 Q600 600, 250 520" fill="none" stroke="#7BA05B" stroke-width="2" marker-end="url(#arrowhead-green)"/>
  <text x="580" y="650" text-anchor="middle" class="arrow-text" font-size="12" fill="#7BA05B">木生火</text>
  
  <path d="M200 700 Q180 800, 200 850" fill="none" stroke="#D4574A" stroke-width="2" marker-end="url(#arrowhead-red)"/>
  <text x="140" y="780" text-anchor="middle" class="arrow-text" font-size="12" fill="#D4574A">火生土</text>
  
  <g transform="translate(0, 1450)">
    <text x="600" y="0" text-anchor="middle" class="subtitle" font-size="14" fill="#888">五句联读</text>
    <text x="600" y="40" text-anchor="middle" class="quote" font-size="18" fill="#666">
      "惟吾德馨——满意解——自在中决策——仁者爱人——红莲绽放"
    </text>
    <line x1="200" y1="70" x2="1000" y2="70" stroke="#E0E0E0" stroke-width="1"/>
    <text x="600" y="100" text-anchor="middle" class="subtitle" font-size="12" fill="#999">
      满意解研究所 · 五路图腾体系 V2.4
    </text>
  </g>
</svg>