metadata:
  version: "2.0"
  last_updated: "2026-03-19"
  maintainer: "Egbertie"

entities:
  专家:
    属性: [姓名, 职称, 领域, 图腾, 状态, 联系方式]
    必填: [姓名, 领域]
    状态枚举: [已确认, 拟邀, 潜在]
    
  方法论:
    属性: [名称, 维度, 适用场景, 工具, 限制, 来源专家]
    必填: [名称, 维度]
    
  案例:
    属性: [客户代号, 行业, 决策类型, 使用的方法论, 专家参与, 结果, 教训, 时间]
    必填: [客户代号, 决策类型]
    
  决策点:
    属性: [类型, 复杂度, 紧急度, 风险等级, 相关案例]
    
  工具:
    属性: [名称, 功能, 输入, 输出, Token消耗估算]
    
  洞察:
    属性: [内容, 来源案例, 类型, 置信度]

relations:
  - 专家 创造 方法论
  - 方法论 应用于 案例
  - 案例 产生 洞察
  - 专家 参与 案例
  - 工具 支持 方法论
  - 客户 产生 案例

namespaces:
  五路图腾: [LIU, SIMON, GUANYIN, CONFUCIUS, HUINENG]
  决策维度: [价值纯度, 理性框架, 压力管理, 合伙人伦理, 极限测试]
  业务阶段: [初创期, 成长期, 扩张期, 成熟期]
