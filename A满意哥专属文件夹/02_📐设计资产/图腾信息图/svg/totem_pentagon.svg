<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="earthGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A84B"/>
      <stop offset="100%" style="stop-color:#8B6914"/>
    </linearGradient>
    <linearGradient id="metalGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F0EB"/>
      <stop offset="100%" style="stop-color:#C0C0C0"/>
    </linearGradient>
    <linearGradient id="waterGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E3A59"/>
      <stop offset="100%" style="stop-color:#0F1F3D"/>
    </linearGradient>
    <linearGradient id="woodGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A7C59"/>
      <stop offset="100%" style="stop-color:#2E5C45"/>
    </linearGradient>
    <linearGradient id="fireGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E63946"/>
      <stop offset="100%" style="stop-color:#B22222"/>
    </linearGradient>
    <linearGradient id="centerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff"/>
      <stop offset="100%" style="stop-color:#f0f0f0"/>
    </linearGradient>
    
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="6" stdDeviation="5" flood-opacity="0.25"/>
    </filter>
    
    <!-- 箭头 -->
    <marker id="arrow5" markerWidth="12" markerHeight="12" refX="11" refY="4" orient="auto">
      <path d="M0,0 L0,8 L11,4 z" fill="#666"/>
    </marker>
  </defs>
  
  <!-- 背景 -->
  <rect width="800" height="800" fill="#FAFAFA"/>
  
  <!-- 标题 -->
  <g transform="translate(400, 50)">
    <text text-anchor="middle" font-family="Source Han Serif CN, Noto Serif SC, serif" font-size="32" font-weight="bold" fill="#1a1a1a">五路图腾体系</text>
    <text text-anchor="middle" y="32" font-family="Source Han Sans CN, Noto Sans SC, sans-serif" font-size="14" fill="#666">五行相生循环图 · Five Elements Cycle</text>
  </g>
  
  <!-- 五边形连接线（相生循环） -->
  <g stroke="#999" stroke-width="2" fill="none" opacity="0.4">
    <!-- 连接五个顶点的五边形 -->
    <path d="M 400 160 L 600 305 L 520 540 L 280 540 L 200 305 Z" stroke-dasharray="8 4"/>
  </g>
  
  <!-- 中心圆 -->
  <g transform="translate(400, 400)">
    <circle r="80" fill="url(#centerGrad)" filter="url(#shadow2)" stroke="#ddd" stroke-width="2"/>
    <text text-anchor="middle" y="-10" font-family="Source Han Serif CN, Noto Serif SC, serif" font-size="16" font-weight="bold" fill="#333">满意解</text>
    <text text-anchor="middle" y="10" font-family="Source Han Serif CN, Noto Serif SC, serif" font-size="16" font-weight="bold" fill="#333">研究所</text>
    <text text-anchor="middle" y="30" font-family="Georgia, serif" font-size="10" fill="#999">Satisficing</text>
    <text text-anchor="middle" y="42" font-family="Georgia, serif" font-size="10" fill="#999">Institute</text>
  </g>
  
  <!-- 中心辐射线 -->
  <g stroke="#ccc" stroke-width="1" opacity="0.5">
    <line x1="400" y1="400" x2="400" y2="200" />
    <line x1="400" y1="400" x2="585" y2="325" />
    <line x1="400" y1="400" x2="505" y2="555" />
    <line x1="400" y1="400" x2="295" y2="555" />
    <line x1="400" y1="400" x2="215" y2="325" />
  </g>
  
  <!-- 顶部：LIU 土 -->
  <g transform="translate(330, 110)" filter="url(#shadow2)">
    <rect width="140" height="160" rx="12" fill="url(#earthGrad2)"/>
    <text x="70" y="35" text-anchor="middle" font-family="Source Han Serif CN, Noto Serif SC, serif" font-size="24" font-weight="bold" fill="#fff">LIU</text>
    <text x="70" y="62" text-anchor="middle" font-family="Source Han Sans CN, Noto Sans SC, sans-serif" font-size="14" fill="#fff" opacity="0.95">刘禹锡</text>
    <text x="70" y="85" text-anchor="middle" font-family="Source Han Sans CN, Noto Sans SC, sans-serif" font-size="12" fill="#fff" opacity="0.85">土 · EARTH</text>
    <line x1="25" y1="100" x2="115" y2="100" stroke="#fff" stroke-width="1.5" opacity="0.3"/>
    <text x="70" y="125" text-anchor="middle" font-family="Source Han Serif CN, Noto Serif SC, serif" font-size="16" fill="#fff">惟吾德馨</text>
    <text x="70" y="145" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#fff" opacity="0.8">Virtue is the true fragrance</text>
    
    <!-- 五行图标 -->
    <rect x="55" y="-12" width="30" height="24" rx="4" fill="#fff"/>
    <text x="70" y="5" text-anchor="middle" font-family="Source Han Serif CN, serif" font-size="14" fill="#C9A227" font-weight="bold">土</text>
  </g>
  
  <!-- 右上：SIMON 金 -->
  <g transform="translate(530, 240)" filter="url(#shadow2)">
    <rect width="140" height="160" rx="12" fill="url(#metalGrad2)"/>
    <text x="70" y="35" text-anchor="middle" font-family="Source Han Serif CN, Noto Serif SC, serif" font-size="22" font-weight="bold" fill="#333">SIMON</text>
    <text x="70" y="62" text-anchor="middle" font-family="Source Han Sans CN, Noto Sans SC, sans-serif" font-size="14" fill="#333" opacity="0.95">司马贺</text>
    <text x="70" y="85" text-anchor="middle" font-family="Source Han Sans CN, Noto Sans SC, sans-serif" font-size="12" fill="#333" opacity="0.85">金 · METAL</text>
    <line x1="25" y1="100" x2="115" y2="100" stroke="#333" stroke-width="1.5" opacity="0.2"/>
    <text x="70" y="125" text-anchor="middle" font-family="Source Han Serif CN, Noto Serif SC, serif" font-size="16" fill="#333">满意解</text>
    <text x="70" y="145" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#333" opacity="0.8">Satisficing</text>
    
    <rect x="55" y="-12" width="30" height="24" rx="4" fill="#333"/>
    <text x="70" y="5" text-anchor="middle" font-family="Source Han Serif CN, serif" font-size="14" fill="#fff" font-weight="bold">金</text>
  </g>
  
  <!-- 右下：GUANYIN 水 -->
  <g transform="translate(450, 470)" filter="url(#shadow2)">
    <rect width="140" height="160" rx="12" fill="url(#waterGrad2)"/>
    <text x="70" y="35" text-anchor="middle" font-family="Source Han Serif CN, Noto Serif SC, serif" font-size="18" font-weight="bold" fill="#fff">GUANYIN</text>
    <text x="70" y="62" text-anchor="middle" font-family="Source Han Sans CN, Noto Sans SC, sans-serif" font-size="14" fill="#fff" opacity="0.95">观自在</text>
    <text x="70" y="85" text-anchor="middle" font-family="Source Han Sans CN, Noto Sans SC, sans-serif" font-size="12" fill="#fff" opacity="0.85">水 · WATER</text>
    <line x1="25" y1="100" x2="115" y2="100" stroke="#fff" stroke-width="1.5" opacity="0.3"/>
    <text x="70" y="125" text-anchor="middle" font-family="Source Han Serif CN, Noto Serif SC, serif" font-size="16" fill="#fff">自在从容</text>
    <text x="70" y="145" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#fff" opacity="0.8">At ease and unhurried</text>
    
    <rect x="55" y="-12" width="30" height="24" rx="4" fill="#fff"/>
    <text x="70" y="5" text-anchor="middle" font-family="Source Han Serif CN, serif" font-size="14" fill="#1A1A2E" font-weight="bold">水</text>
  </g>
  
  <!-- 左下：CONFUCIUS 木 -->
  <g transform="translate(210, 470)" filter="url(#shadow2)">
    <rect width="140" height="160" rx="12" fill="url(#woodGrad2)"/>
    <text x="70" y="35" text-anchor="middle" font-family="Source Han Serif CN, Noto Serif SC, serif" font-size="16" font-weight="bold" fill="#fff">CONFUCIUS</text>
    <text x="70" y="62" text-anchor="middle" font-family="Source Han Sans CN, Noto Sans SC, sans-serif" font-size="14" fill="#fff" opacity="0.95">孔子</text>
    <text x="70" y="85" text-anchor="middle" font-family="Source Han Sans CN, Noto Sans SC, sans-serif" font-size="12" fill="#fff" opacity="0.85">木 · WOOD</text>
    <line x1="25" y1="100" x2="115" y2="100" stroke="#fff" stroke-width="1.5" opacity="0.3"/>
    <text x="70" y="125" text-anchor="middle" font-family="Source Han Serif CN, Noto Serif SC, serif" font-size="16" fill="#fff">仁者爱人</text>
    <text x="70" y="145" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#fff" opacity="0.8">Benevolence</text>
    
    <rect x="55" y="-12" width="30" height="24" rx="4" fill="#fff"/>
    <text x="70" y="5" text-anchor="middle" font-family="Source Han Serif CN, serif" font-size="14" fill="#2E5C45" font-weight="bold">木</text>
  </g>
  
  <!-- 左上：HUINENG 火 -->
  <g transform="translate(130, 240)" filter="url(#shadow2)">
    <rect width="140" height="160" rx="12" fill="url(#fireGrad2)"/>
    <text x="70" y="35" text-anchor="middle" font-family="Source Han Serif CN, Noto Serif SC, serif" font-size="18" font-weight="bold" fill="#fff">HUINENG</text>
    <text x="70" y="62" text-anchor="middle" font-family="Source Han Sans CN, Noto Sans SC, sans-serif" font-size="14" fill="#fff" opacity="0.95">六祖</text>
    <text x="70" y="85" text-anchor="middle" font-family="Source Han Sans CN, Noto Sans SC, sans-serif" font-size="12" fill="#fff" opacity="0.85">火 · FIRE</text>
    <line x1="25" y1="100" x2="115" y2="100" stroke="#fff" stroke-width="1.5" opacity="0.3"/>
    <text x="70" y="125" text-anchor="middle" font-family="Source Han Serif CN, Noto Serif SC, serif" font-size="14" fill="#fff">顿悟/知行合一</text>
    <text x="70" y="145" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#fff" opacity="0.8">Sudden Enlightenment</text>
    
    <rect x="55" y="-12" width="30" height="24" rx="4" fill="#fff"/>
    <text x="70" y="5" text-anchor="middle" font-family="Source Han Serif CN, serif" font-size="14" fill="#DC143C" font-weight="bold">火</text>
  </g>
  
  <!-- 相生标注箭头 -->
  <g font-family="Source Han Sans CN, Noto Sans SC, sans-serif" font-size="11" fill="#666" font-weight="bold">
    <text x="475" y="225" text-anchor="middle">土生金</text>
    <text x="560" y="410" text-anchor="middle">金生水</text>
    <text x="400" y="580" text-anchor="middle">水生木</text>
    <text x="240" y="410" text-anchor="middle">木生火</text>
    <text x="325" y="225" text-anchor="middle">火生土</text>
  </g>
  
  <!-- 底部说明 -->
  <g transform="translate(400, 750)">
    <text text-anchor="middle" font-family="Source Han Sans CN, Noto Sans SC, sans-serif" font-size="11" fill="#999">东方智慧 × 现代决策科学 | Satisficing Institute</text>
  </g>
</svg>
