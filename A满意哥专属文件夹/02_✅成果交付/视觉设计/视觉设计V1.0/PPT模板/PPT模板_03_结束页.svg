<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="endBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E8B57"/>
      <stop offset="50%" style="stop-color:#2C3E50"/>
      <stop offset="100%" style="stop-color:#1A1A2E"/>
    </linearGradient>
    
    <filter id="endShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="4" stdDeviation="10" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1920" height="1080" fill="url(#endBg)"/>
  
  <!-- 装饰圆 -->
  <circle cx="200" cy="200" r="300" fill="#FFFFFF" opacity="0.05"/>
  <circle cx="1700" cy="900" r="400" fill="#FFFFFF" opacity="0.05"/>
  
  <!-- 中央Logo -->
  <g transform="translate(960, 300)" filter="url(#endShadow)">
    <circle cx="0" cy="0" r="100" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.3"/>
    
    <circle cx="0" cy="0" r="30" fill="#D4A84B"/>
    <text x="0" y="10" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="24" fill="#FFFFFF" font-weight="bold">土</text>
    
    <circle cx="65" cy="-35" r="22" fill="#C0C0C0"/>
    <text x="65" y="-28" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="16" fill="#333333" font-weight="bold">金</text>
    
    <circle cx="50" cy="55" r="22" fill="#2C3E50"/>
    <text x="50" y="62" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="16" fill="#FFFFFF" font-weight="bold">水</text>
    
    <circle cx="-50" cy="55" r="22" fill="#2E8B57"/>
    <text x="-50" y="62" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="16" fill="#FFFFFF" font-weight="bold">木</text>
    
    <circle cx="-65" cy="-35" r="22" fill="#E74C3C"/>
    <text x="-65" y="-28" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="16" fill="#FFFFFF" font-weight="bold">火</text>
  </g>
  
  <!-- 感谢文字 -->
  <text x="960" y="520" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="72" fill="#FFFFFF" font-weight="bold" letter-spacing="8">感谢聆听</text>
  
  <text x="960" y="600" text-anchor="middle" font-family="Inter, sans-serif" font-size="32" fill="#FFFFFF" opacity="0.8">THANK YOU</text>
  
  <!-- 分隔线 -->
  <line x1="760" y1="660" x2="1160" y2="660" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>
  
  <!-- 联系信息 -->
  <text x="960" y="750" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="24" fill="#FFFFFF">满意解研究所 · SATISFICING INSTITUTE</text>
  
  <text x="960" y="800" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="20" fill="#FFFFFF" opacity="0.8">硬科技合伙人决策教练</text>
  
  <!-- 二维码占位 -->
  <rect x="860" y="850" width="200" height="200" fill="#FFFFFF" rx="8"/>
  
  <text x="960" y="960" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="16" fill="#1A1A2E">[公众号二维码]</text>
  
  <!-- 底部页码 -->
  <text x="1800" y="1020" text-anchor="end" font-family="Inter, sans-serif" font-size="18" fill="#FFFFFF" opacity="0.5">END</text>
</svg>