<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="huinengGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F1948A"/>
      <stop offset="50%" style="stop-color:#E74C3C"/>
      <stop offset="100%" style="stop-color:#C0392B"/>
    </linearGradient>
    <filter id="huinengShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
    <filter id="fireGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="400" height="400" fill="#FAFAFA"/>
  
  <!-- 外圆环 -->
  <circle cx="200" cy="200" r="160" fill="none" stroke="#E8E8E8" stroke-width="2"/>
  <circle cx="200" cy="200" r="140" fill="none" stroke="#F0F0F0" stroke-width="1"/>
  
  <!-- 主圆形 - 火红色 -->
  <circle cx="200" cy="180" r="100" fill="url(#huinengGradient)" filter="url(#huinengShadow)"/>
  
  <!-- 内部装饰 - 火焰/顿悟感 -->
  <path d="M200 140 Q220 160 210 180 Q230 170 220 200 Q200 190 200 220 Q200 190 180 200 Q170 170 190 180 Q180 160 200 140" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="200" cy="185" r="15" fill="#FFFFFF" opacity="0.5"/>
  
  <!-- 火花点缀 -->
  <circle cx="170" cy="160" r="4" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="230" cy="160" r="4" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="160" cy="190" r="3" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="240" cy="190" r="3" fill="#FFFFFF" opacity="0.5"/>
  
  <!-- 火字 -->
  <text x="200" y="195" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="48" fill="#FFFFFF" font-weight="bold">火</text>
  
  <!-- HUINENG 标识 -->
  <text x="200" y="320" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" fill="#E74C3C" font-weight="bold" letter-spacing="2">HUINENG</text>
  
  <!-- 核心精神 -->
  <text x="200" y="355" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="20" fill="#666666">知行合一</text>
  
  <!-- 五行标识 -->
  <circle cx="340" cy="60" r="25" fill="#E74C3C" opacity="0.9"/>
  <text x="340" y="67" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="16" fill="#FFFFFF" font-weight="bold">火</text>
</svg>