<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E"/>
      <stop offset="100%" style="stop-color:#2C3E50"/>
    </linearGradient>
    
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A84B"/>
      <stop offset="100%" style="stop-color:#B8953A"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="1920" height="1080" fill="url(#bgGradient)"/>
  
  <!-- 装饰性背景 -->
  <g opacity="0.03">
    <circle cx="960" cy="540" r="350" fill="none" stroke="#FFFFFF" stroke-width="1"/>
    <circle cx="960" cy="540" r="300" fill="none" stroke="#FFFFFF" stroke-width="1"/>
  </g>
  
  <!-- 中心Logo大图标 -->
  <g transform="translate(960, 400)">
    <circle cx="0" cy="0" r="120" fill="none" stroke="#D4A84B" stroke-width="2" opacity="0.5"/>
    
    <circle cx="0" cy="0" r="110" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.2"/>
    
    <!-- 中心土 -->
    <circle cx="0" cy="0" r="25" fill="#D4A84B"/>
    
    <text x="0" y="8" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="20" fill="#FFFFFF" font-weight="bold">土</text>
    
    <!-- 金 -->
    <circle cx="65" cy="-35" r="20" fill="#C0C0C0"/>
    
    <text x="65" y="-28" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="16" fill="#333333" font-weight="bold">金</text>
    
    <!-- 水 -->
    <circle cx="50" cy="55" r="20" fill="#2C3E50"/>
    
    <text x="50" y="62" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="16" fill="#FFFFFF" font-weight="bold">水</text>
    
    <!-- 木 -->
    <circle cx="-50" cy="55" r="20" fill="#2E8B57"/>
    
    <text x="-50" y="62" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="16" fill="#FFFFFF" font-weight="bold">木</text>
    
    <!-- 火 -->
    <circle cx="-65" cy="-35" r="20" fill="#E74C3C"/>
    
    <text x="-65" y="-28" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="16" fill="#FFFFFF" font-weight="bold">火</text>
  </g>
  
  <!-- 感谢语 -->
  <g transform="translate(960, 620)">
    <text x="0" y="0" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="56" fill="#FFFFFF" font-weight="bold" letter-spacing="16">感谢聆听</text>
    
    <text x="0" y="60" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="24" fill="#D4A84B">THANK YOU</text>
  </g>
  
  <!-- 联系信息 -->
  <g transform="translate(960, 780)">
    <text x="0" y="0" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="18" fill="#AAAAAA">满意解研究所 · 硬科技合伙人决策教练</text>
    
    <text x="0" y="40" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="16" fill="#888888">2026年3月25日 正式官宣</text>
  </g>
  
  <!-- 底部装饰 -->
  <rect x="0" y="1050" width="1920" height="30" fill="#D4A84B"/>
  
  <!-- 底部页码 -->
  <text x="1860" y="1030" text-anchor="end" font-family="Inter, sans-serif" font-size="16" fill="#666666">END</text>
</svg>