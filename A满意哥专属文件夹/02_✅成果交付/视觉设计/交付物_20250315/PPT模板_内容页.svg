<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FAFAFA"/>
      <stop offset="100%" style="stop-color:#F5F5F5"/>
    </linearGradient>
    
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A84B"/>
      <stop offset="100%" style="stop-color:#B8953A"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="1920" height="1080" fill="url(#bgGradient)"/>
  
  <!-- 左侧装饰条 -->
  <rect x="0" y="0" width="8" height="1080" fill="#1A1A2E"/>
  
  <!-- 顶部Logo区域 -->
  <g transform="translate(100, 60)">
    <circle cx="0" cy="0" r="20" fill="none" stroke="#D4A84B" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="5" fill="#D4A84B"/>
    
    <text x="0" y="2" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="5" fill="#333333">土</text>
    
    <circle cx="10" cy="-6" r="4" fill="#C0C0C0"/>
    
    <text x="10" y="-4" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="4" fill="#333333">金</text>
    
    <circle cx="8" cy="8" r="4" fill="#2C3E50"/>
    
    <text x="8" y="10" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="4" fill="#FFFFFF">水</text>
    
    <circle cx="-8" cy="8" r="4" fill="#2E8B57"/>
    
    <text x="-8" y="10" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="4" fill="#FFFFFF">木</text>
    
    <circle cx="-10" cy="-6" r="4" fill="#E74C3C"/>
    
    <text x="-10" y="-4" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="4" fill="#FFFFFF">火</text>
    
    <text x="35" y="5" font-family="Noto Serif SC, serif" font-size="14" fill="#1A1A2E">满意解研究所</text>
  </g>
  
  <!-- 页面标题 -->
  <g transform="translate(100, 150)">
    <text x="0" y="0" font-family="Noto Serif SC, serif" font-size="48" fill="#1A1A2E" font-weight="bold">页面标题</text>
    
    <line x1="0" y1="20" x2="200" y2="20" stroke="#D4A84B" stroke-width="3"/>
  </g>
  
  <!-- 内容区域占位 -->
  <g transform="translate(100, 250)">
    <rect x="0" y="0" width="1720" height="600" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="8,4"/>
    
    <text x="860" y="300" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="24" fill="#CCCCCC">内容区域 / Content Area</text>
  </g>
  
  <!-- 底部装饰 -->
  <rect x="0" y="1050" width="1920" height="30" fill="#1A1A2E"/>
  
  <!-- 底部页码 -->
  <text x="1860" y="1030" text-anchor="end" font-family="Inter, sans-serif" font-size="16" fill="#999999">02</text>
  
  <!-- 底部品牌名 -->
  <text x="60" y="1030" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#999999">满意解研究所 · 硬科技合伙人决策教练</text>
</svg>