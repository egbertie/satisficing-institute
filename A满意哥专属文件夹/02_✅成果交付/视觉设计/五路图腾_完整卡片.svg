<svg viewBox="0 0 600 120" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="120" fill="#1a1a2e"/>
  
  <!-- LIU 土 -->
  <g transform="translate(60,60)">
    <rect x="-40" y="-50" width="80" height="100" rx="10" fill="none" stroke="#d4a574" stroke-width="2"/>
    <text x="0" y="-15" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#d4a574" text-anchor="middle">LIU</text>
    <text x="0" y="10" font-family="Arial, sans-serif" font-size="12" fill="#d4a574" text-anchor="middle">土</text>
    <text x="0" y="30" font-family="Arial, sans-serif" font-size="10" fill="#a0a0a0" text-anchor="middle">惟吾德馨</text>
  </g>
  
  <!-- SIMON 金 -->
  <g transform="translate(180,60)">
    <rect x="-40" y="-50" width="80" height="100" rx="10" fill="none" stroke="#c0c0c0" stroke-width="2"/>
    <text x="0" y="-15" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#c0c0c0" text-anchor="middle">SIMON</text>
    <text x="0" y="10" font-family="Arial, sans-serif" font-size="12" fill="#c0c0c0" text-anchor="middle">金</text>
    <text x="0" y="30" font-family="Arial, sans-serif" font-size="10" fill="#a0a0a0" text-anchor="middle">满意解</text>
  </g>
  
  <!-- GUANYIN 水 -->
  <g transform="translate(300,60)">
    <rect x="-40" y="-50" width="80" height="100" rx="10" fill="none" stroke="#4a90e2" stroke-width="2"/>
    <text x="0" y="-15" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#4a90e2" text-anchor="middle">GUANYIN</text>
    <text x="0" y="10" font-family="Arial, sans-serif" font-size="12" fill="#4a90e2" text-anchor="middle">水</text>
    <text x="0" y="30" font-family="Arial, sans-serif" font-size="10" fill="#a0a0a0" text-anchor="middle">自在从容</text>
  </g>
  
  <!-- CONFUCIUS 木 -->
  <g transform="translate(420,60)">
    <rect x="-40" y="-50" width="80" height="100" rx="10" fill="none" stroke="#7cb342" stroke-width="2"/>
    <text x="0" y="-15" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#7cb342" text-anchor="middle">CONFUCIUS</text>
    <text x="0" y="10" font-family="Arial, sans-serif" font-size="12" fill="#7cb342" text-anchor="middle">木</text>
    <text x="0" y="30" font-family="Arial, sans-serif" font-size="10" fill="#a0a0a0" text-anchor="middle">仁者爱人</text>
  </g>
  
  <!-- HUINENG 火 -->
  <g transform="translate(540,60)">
    <rect x="-40" y="-50" width="80" height="100" rx="10" fill="none" stroke="#e94560" stroke-width="2"/>
    <text x="0" y="-15" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#e94560" text-anchor="middle">HUINENG</text>
    <text x="0" y="10" font-family="Arial, sans-serif" font-size="12" fill="#e94560" text-anchor="middle">火</text>
    <text x="0" y="30" font-family="Arial, sans-serif" font-size="10" fill="#a0a0a0" text-anchor="middle">顿悟知行</text>
  </g>
</svg>