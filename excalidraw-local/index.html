<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excalidraw - Local Deployment</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        #root {
            height: 100vh;
            width: 100vw;
        }
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            padding: 10px 20px;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            margin: 0;
            font-size: 18px;
            color: #333;
        }
        .header .info {
            font-size: 12px;
            color: #666;
        }
    </style>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@excalidraw/excalidraw@0.17.6/dist/excalidraw.production.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@excalidraw/excalidraw@0.17.6/dist/fonts.css">
</head>
<body>
    <div class="header">
        <h1>🎨 Excalidraw 本地部署版</h1>
        <div class="info">本地访问地址: http://localhost:3000</div>
    </div>
    <div id="root" style="padding-top: 50px;"></div>
    <script>
        const App = () => {
            return React.createElement(
                React.Fragment,
                null,
                React.createElement(ExcalidrawLib.Excalidraw, {
                    initialData: {
                        elements: [],
                        appState: {
                            viewBackgroundColor: "#ffffff"
                        }
                    },
                    theme: "light",
                    langCode: "zh-CN",
                    name: "本地白板",
                    UIOptions: {
                        canvasActions: {
                            loadScene: true,
                            saveToActiveFile: true,
                            export: { saveFileToDisk: true },
                            toggleTheme: true
                        }
                    }
                })
            );
        };
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
