<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    
    <!-- 五行色彩 -->
    <linearGradient id="earthGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A84B"/>
      <stop offset="100%" style="stop-color:#B8953A"/>
    </linearGradient>
    
    <linearGradient id="metalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E8E8"/>
      <stop offset="100%" style="stop-color:#C0C0C0"/>
    </linearGradient>
    
    <linearGradient id="waterGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2C3E50"/>
      <stop offset="100%" style="stop-color:#1a252f"/>
    </linearGradient>
    
    <linearGradient id="woodGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E8B57"/>
      <stop offset="100%" style="stop-color:#1e6b3f"/>
    </linearGradient>
    
    <linearGradient id="fireGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E74C3C"/>
      <stop offset="100%" style="stop-color:#C0392B"/>
    </linearGradient>
    
    <!-- 光晕效果 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 阴影效果 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    
    <!-- 头像占位符圆形蒙版 -->
    <clipPath id="avatarClip">
      <circle cx="0" cy="0" r="45"/>
    </clipPath>
  </defs>
  
  <!-- 背景 -->
  <rect width="1920" height="1080" fill="url(#bgGradient)"/>
  
  <!-- 装饰性背景元素 -->
  <g opacity="0.03">
    <circle cx="960" cy="540" r="400" fill="none" stroke="#ffffff" stroke-width="1"/>
    <circle cx="960" cy="540" r="350" fill="none" stroke="#ffffff" stroke-width="1"/>
    <circle cx="960" cy="540" r="300" fill="none" stroke="#ffffff" stroke-width="1"/>
  </g>
  
  <!-- 标题区域 -->
  <g transform="translate(960, 80)">
    <text x="0" y="0" text-anchor="middle" font-family="Noto Sans SC, Microsoft YaHei, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" filter="url(#shadow)">五路图腾 · 五行齐备</text>
    <text x="0" y="40" text-anchor="middle" font-family="Noto Sans SC, Microsoft YaHei, sans-serif" font-size="18" fill="#aaaaaa">相生相克 · 生生不息 · 决策智慧体系 V2.4</text>
  </g>
  
  <!-- 五行相生循环图 - 中心大圆 -->
  <g transform="translate(960, 540)">
    <!-- 外圈装饰 -->
    <circle cx="0" cy="0" r="320" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.1"/>
    <circle cx="0" cy="0" r="280" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.15"/>
    
    <!-- 五行相生箭头 - 顺时针 -->
    <g opacity="0.4">
      <!-- 土→金 -->
      <path d="M -180,-120 Q -120,-200 0,-220" fill="none" stroke="#D4A84B" stroke-width="3" marker-end="url(#arrowEarth)"/>
      <!-- 金→水 -->
      <path d="M 120,-180 Q 200,-120 220,0" fill="none" stroke="#E8E8E8" stroke-width="3" marker-end="url(#arrowMetal)"/>
      <!-- 水→木 -->
      <path d="M 180,120 Q 120,200 0,220" fill="none" stroke="#2C3E50" stroke-width="3" marker-end="url(#arrowWater)"/>
      <!-- 木→火 -->
      <path d="M -120,180 Q -200,120 -220,0" fill="none" stroke="#2E8B57" stroke-width="3" marker-end="url(#arrowWood)"/>
      <!-- 火→土 -->
      <path d="M -80,-160 Q -160,-80 -180,-120" fill="none" stroke="#E74C3C" stroke-width="3"/>
    </g>
    
    <!-- 中心指挥官位置 -->
    <circle cx="0" cy="0" r="60" fill="#2a2a4e" stroke="#ffffff" stroke-width="2" filter="url(#shadow)"/>
    <text x="0" y="-10" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">指挥官</text>
    <text x="0" y="15" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="12" fill="#aaaaaa">Egbertie</text>
  </g>
  
  <!-- ===== 五路图腾卡片 ===== -->
  
  <!-- 1. LIU 刘禹锡 - 土 - 左上方 -->
  <g transform="translate(350, 280)">
    <!-- 卡片背景 -->
    <rect x="-140" y="-100" width="280" height="200" rx="16" fill="url(#earthGradient)" filter="url(#shadow)"/>
    <!-- 五行标识 -->
    <circle cx="-100" cy="-60" r="25" fill="#ffffff" opacity="0.2"/>
    <text x="-100" y="-52" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="20" fill="#ffffff" font-weight="bold">土</text>
    <!-- 头像占位符 -->
    <circle cx="90" cy="-50" r="45" fill="#f0f0f0" stroke="#ffffff" stroke-width="3"/>
    <g transform="translate(90, -50)">
      <circle cx="0" cy="-10" r="15" fill="#cccccc"/>
      <ellipse cx="0" cy="20" rx="25" ry="20" fill="#cccccc"/>
      <text x="0" y="5" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="10" fill="#666666">头像</text>
    </g>
    <!-- 名称 -->
    <text x="-60" y="-20" font-family="Noto Sans SC, sans-serif" font-size="28" fill="#ffffff" font-weight="bold">LIU</text>
    <text x="-60" y="10" font-family="Noto Sans SC, sans-serif" font-size="16" fill="#ffffff" opacity="0.9">刘禹锡</text>
    <!-- 核心精神 -->
    <text x="-100" y="50" font-family="Noto Sans SC, sans-serif" font-size="22" fill="#ffffff" font-weight="bold">惟吾德馨</text>
    <text x="-100" y="75" font-family="Noto Sans SC, sans-serif" font-size="12" fill="#ffffff" opacity="0.8">价值纯度 · 反物质主义</text>
    <!-- 颜色条 -->
    <rect x="-140" y="85" width="280" height="15" rx="0 0 16 16" fill="#B8953A"/>
  </g>
  
  <!-- 2. SIMON 西蒙 - 金 - 右上方 -->
  <g transform="translate(1570, 280)">
    <rect x="-140" y="-100" width="280" height="200" rx="16" fill="url(#metalGradient)" filter="url(#shadow)"/>
    <circle cx="-100" cy="-60" r="25" fill="#333333" opacity="0.2"/>
    <text x="-100" y="-52" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="20" fill="#333333" font-weight="bold">金</text>
    <!-- 头像占位符 -->
    <circle cx="90" cy="-50" r="45" fill="#f8f8f8" stroke="#666666" stroke-width="3"/>
    <g transform="translate(90, -50)">
      <circle cx="0" cy="-10" r="15" fill="#dddddd"/>
      <ellipse cx="0" cy="20" rx="25" ry="20" fill="#dddddd"/>
      <text x="0" y="5" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="10" fill="#666666">头像</text>
    </g>
    <text x="-60" y="-20" font-family="Noto Sans SC, sans-serif" font-size="28" fill="#333333" font-weight="bold">SIMON</text>
    <text x="-60" y="10" font-family="Noto Sans SC, sans-serif" font-size="16" fill="#555555">西蒙</text>
    <text x="-100" y="50" font-family="Noto Sans SC, sans-serif" font-size="22" fill="#333333" font-weight="bold">满意解</text>
    <text x="-100" y="75" font-family="Noto Sans SC, sans-serif" font-size="12" fill="#555555">有限理性 · 决策工具</text>
    <rect x="-140" y="85" width="280" height="15" rx="0 0 16 16" fill="#C0C0C0"/>
  </g>
  
  <!-- 3. GUANYIN 观自在 - 水 - 右侧中 -->
  <g transform="translate(1620, 540)">
    <rect x="-140" y="-100" width="280" height="200" rx="16" fill="url(#waterGradient)" filter="url(#shadow)"/>
    <circle cx="-100" cy="-60" r="25" fill="#ffffff" opacity="0.15"/>
    <text x="-100" y="-52" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="20" fill="#ffffff" font-weight="bold">水</text>
    <!-- 头像占位符 -->
    <circle cx="90" cy="-50" r="45" fill="#f0f0f0" stroke="#4a6fa5" stroke-width="3"/>
    <g transform="translate(90, -50)">
      <circle cx="0" cy="-10" r="15" fill="#cccccc"/>
      <ellipse cx="0" cy="20" rx="25" ry="20" fill="#cccccc"/>
      <text x="0" y="5" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="10" fill="#666666">头像</text>
    </g>
    <text x="-60" y="-20" font-family="Noto Sans SC, sans-serif" font-size="26" fill="#ffffff" font-weight="bold">GUANYIN</text>
    <text x="-60" y="10" font-family="Noto Sans SC, sans-serif" font-size="16" fill="#ffffff" opacity="0.9">观自在</text>
    <text x="-100" y="50" font-family="Noto Sans SC, sans-serif" font-size="22" fill="#ffffff" font-weight="bold">自在从容</text>
    <text x="-100" y="75" font-family="Noto Sans SC, sans-serif" font-size="12" fill="#ffffff" opacity="0.8">教练状态 · 安全空间</text>
    <rect x="-140" y="85" width="280" height="15" rx="0 0 16 16" fill="#1a252f"/>
  </g>
  
  <!-- 4. CONFUCIUS 孔子 - 木 - 右下方 -->
  <g transform="translate(1570, 800)">
    <rect x="-140" y="-100" width="280" height="200" rx="16" fill="url(#woodGradient)" filter="url(#shadow)"/>
    <circle cx="-100" cy="-60" r="25" fill="#ffffff" opacity="0.2"/>
    <text x="-100" y="-52" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="20" fill="#ffffff" font-weight="bold">木</text>
    <!-- 头像占位符 -->
    <circle cx="90" cy="-50" r="45" fill="#f0f0f0" stroke="#1e6b3f" stroke-width="3"/>
    <g transform="translate(90, -50)">
      <circle cx="0" cy="-10" r="15" fill="#cccccc"/>
      <ellipse cx="0" cy="20" rx="25" ry="20" fill="#cccccc"/>
      <text x="0" y="5" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="10" fill="#666666">头像</text>
    </g>
    <text x="-60" y="-20" font-family="Noto Sans SC, sans-serif" font-size="24" fill="#ffffff" font-weight="bold">CONFUCIUS</text>
    <text x="-60" y="10" font-family="Noto Sans SC, sans-serif" font-size="16" fill="#ffffff" opacity="0.9">孔子</text>
    <text x="-100" y="50" font-family="Noto Sans SC, sans-serif" font-size="22" fill="#ffffff" font-weight="bold">仁者爱人</text>
    <text x="-100" y="75" font-family="Noto Sans SC, sans-serif" font-size="12" fill="#ffffff" opacity="0.8">合伙伦理 · 儒商精神</text>
    <rect x="-140" y="85" width="280" height="15" rx="0 0 16 16" fill="#1e6b3f"/>
  </g>
  
  <!-- 5. HUINENG 六祖 - 火 - 左下方 -->
  <g transform="translate(350, 800)">
    <rect x="-140" y="-100" width="280" height="200" rx="16" fill="url(#fireGradient)" filter="url(#shadow)"/>
    <circle cx="-100" cy="-60" r="25" fill="#ffffff" opacity="0.25"/>
    <text x="-100" y="-52" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="20" fill="#ffffff" font-weight="bold">火</text>
    <!-- 头像占位符 -->
    <circle cx="90" cy="-50" r="45" fill="#f0f0f0" stroke="#C0392B" stroke-width="3"/>
    <g transform="translate(90, -50)">
      <circle cx="0" cy="-10" r="15" fill="#cccccc"/>
      <ellipse cx="0" cy="20" rx="25" ry="20" fill="#cccccc"/>
      <text x="0" y="5" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="10" fill="#666666">头像</text>
    </g>
    <text x="-60" y="-20" font-family="Noto Sans SC, sans-serif" font-size="26" fill="#ffffff" font-weight="bold">HUINENG</text>
    <text x="-60" y="10" font-family="Noto Sans SC, sans-serif" font-size="16" fill="#ffffff" opacity="0.9">六祖慧能</text>
    <text x="-100" y="50" font-family="Noto Sans SC, sans-serif" font-size="22" fill="#ffffff" font-weight="bold">知行合一</text>
    <text x="-100" y="75" font-family="Noto Sans SC, sans-serif" font-size="12" fill="#ffffff" opacity="0.8">顿悟直觉 · 红莲绽放</text>
    <rect x="-140" y="85" width="280" height="15" rx="0 0 16 16" fill="#C0392B"/>
  </g>
  
  <!-- ===== 相生关系连接线和标签 ===== -->
  
  <!-- 土生金 -->
  <g>
    <path d="M 490 280 Q 700 200 1270 200 Q 1430 200 1430 180" fill="none" stroke="#D4A84B" stroke-width="4" marker-end="url(#arrowEarth2)" opacity="0.8"/>
    <circle cx="960" cy="200" r="30" fill="#D4A84B" opacity="0.9"/>
    <text x="960" y="206" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">土生金</text>
  </g>
  
  <!-- 金生水 -->
  <g>
    <path d="M 1570 380 Q 1570 450 1570 440" fill="none" stroke="#C0C0C0" stroke-width="4" marker-end="url(#arrowMetal2)" opacity="0.8"/>
    <circle cx="1570" cy="430" r="25" fill="#C0C0C0" opacity="0.9"/>
    <text x="1570" y="435" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="12" fill="#333333" font-weight="bold">金生水</text>
  </g>
  
  <!-- 水生木 -->
  <g>
    <path d="M 1570 640 Q 1570 700 1570 700" fill="none" stroke="#2C3E50" stroke-width="4" marker-end="url(#arrowWater2)" opacity="0.8"/>
    <circle cx="1570" cy="690" r="25" fill="#2C3E50" opacity="0.9"/>
    <text x="1570" y="695" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="12" fill="#ffffff" font-weight="bold">水生木</text>
  </g>
  
  <!-- 木生火 -->
  <g>
    <path d="M 1430 800 Q 1000 800 800 800 Q 600 800 490 800" fill="none" stroke="#2E8B57" stroke-width="4" marker-end="url(#arrowWood2)" opacity="0.8"/>
    <circle cx="960" cy="800" r="30" fill="#2E8B57" opacity="0.9"/>
    <text x="960" y="806" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">木生火</text>
  </g>
  
  <!-- 火生土 -->
  <g>
    <path d="M 350 700 Q 350 600 350 380" fill="none" stroke="#E74C3C" stroke-width="4" marker-end="url(#arrowFire2)" opacity="0.8"/>
    <circle cx="350" cy="540" r="25" fill="#E74C3C" opacity="0.9"/>
    <text x="350" y="545" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="12" fill="#ffffff" font-weight="bold">火生土</text>
  </g>
  
  <!-- ===== 箭头标记定义 ===== -->
  <defs>
    <marker id="arrowEarth2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#D4A84B"/>
    </marker>
    <marker id="arrowMetal2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#C0C0C0"/>
    </marker>
    <marker id="arrowWater2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2C3E50"/>
    </marker>
    <marker id="arrowWood2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2E8B57"/>
    </marker>
    <marker id="arrowFire2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#E74C3C"/>
    </marker>
  </defs>
  
  <!-- ===== 底部说明区域 ===== -->
  <g transform="translate(960, 1000)">
    <text x="0" y="0" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#666666">五行相生：土→金→水→木→火→土 · 生生不息 · 决策闭环</text>
    <text x="0" y="25" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="12" fill="#444444" font-weight="bold">满意解研究所 · 五路图腾体系 V2.4</text>
  </g>
  
  <!-- ===== 左侧说明文字 ===== -->
  <g transform="translate(100, 540)">
    <text x="0" y="-100" font-family="Noto Sans SC, sans-serif" font-size="16" fill="#888888" font-weight="bold">相生链条</text>
    <text x="0" y="-70" font-family="Noto Sans SC, sans-serif" font-size="13" fill="#aaaaaa">土：价值清晰</text>
    <text x="0" y="-45" font-family="Noto Sans SC, sans-serif" font-size="13" fill="#aaaaaa">↓</text>
    <text x="0" y="-20" font-family="Noto Sans SC, sans-serif" font-size="13" fill="#aaaaaa">金：方法得当</text>
    <text x="0" y="5" font-family="Noto Sans SC, sans-serif" font-size="13" fill="#aaaaaa">↓</text>
    <text x="0" y="30" font-family="Noto Sans SC, sans-serif" font-size="13" fill="#aaaaaa">水：心态从容</text>
    <text x="0" y="55" font-family="Noto Sans SC, sans-serif" font-size="13" fill="#aaaaaa">↓</text>
    <text x="0" y="80" font-family="Noto Sans SC, sans-serif" font-size="13" fill="#aaaaaa">木：伦理培育</text>
    <text x="0" y="105" font-family="Noto Sans SC, sans-serif" font-size="13" fill="#aaaaaa">↓</text>
    <text x="0" y="130" font-family="Noto Sans SC, sans-serif" font-size="13" fill="#aaaaaa">火：顿悟洞见</text>
  </g>
  
</svg>