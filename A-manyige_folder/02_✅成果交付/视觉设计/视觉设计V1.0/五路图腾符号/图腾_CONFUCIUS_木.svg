<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="confuciusGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3D9970"/>
      <stop offset="100%" style="stop-color:#2E8B57"/>
    </linearGradient>
    <filter id="confuciusShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="400" height="400" fill="#FAFAFA"/>
  
  <!-- 外圆环 -->
  <circle cx="200" cy="200" r="160" fill="none" stroke="#E8E8E8" stroke-width="2"/>
  <circle cx="200" cy="200" r="140" fill="none" stroke="#F0F0F0" stroke-width="1"/>
  
  <!-- 主圆形 - 青绿色 -->
  <circle cx="200" cy="180" r="100" fill="url(#confuciusGradient)" filter="url(#confuciusShadow)"/>
  
  <!-- 内部装饰 - 树枝/生长感 -->
  <path d="M160 220 Q180 180 200 160 Q220 180 240 220" fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.4" stroke-linecap="round"/>
  <path d="M180 200 Q200 170 220 200" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
  <circle cx="170" cy="190" r="5" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="230" cy="190" r="5" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="200" cy="170" r="6" fill="#FFFFFF" opacity="0.6"/>
  
  <!-- 木字 -->
  <text x="200" y="195" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="48" fill="#FFFFFF" font-weight="bold">木</text>
  
  <!-- CONFUCIUS 标识 -->
  <text x="200" y="320" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" fill="#2E8B57" font-weight="bold" letter-spacing="1">CONFUCIUS</text>
  
  <!-- 核心精神 -->
  <text x="200" y="355" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="20" fill="#666666">仁者爱人</text>
  
  <!-- 五行标识 -->
  <circle cx="340" cy="60" r="25" fill="#2E8B57" opacity="0.9"/>
  <text x="340" y="67" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="16" fill="#FFFFFF" font-weight="bold">木</text>
</svg>