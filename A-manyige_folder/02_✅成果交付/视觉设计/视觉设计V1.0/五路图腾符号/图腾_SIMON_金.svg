<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="simonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E8E8"/>
      <stop offset="50%" style="stop-color:#C0C0C0"/>
      <stop offset="100%" style="stop-color:#A0A0A0"/>
    </linearGradient>
    <filter id="simonShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
    <filter id="metalShine">
      <feSpecularLighting result="spec" specularConstant="1" specularExponent="20" lighting-color="#ffffff">
        <fePointLight x="150" y="150" z="200"/>
      </feSpecularLighting>
      <feComposite in="SourceGraphic" in2="spec" operator="arithmetic" k1="0" k2="1" k3="1" k4="0"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="400" height="400" fill="#FAFAFA"/>
  
  <!-- 外圆环 -->
  <circle cx="200" cy="200" r="160" fill="none" stroke="#E8E8E8" stroke-width="2"/>
  <circle cx="200" cy="200" r="140" fill="none" stroke="#F0F0F0" stroke-width="1"/>
  
  <!-- 主圆形 - 银白色 -->
  <circle cx="200" cy="180" r="100" fill="url(#simonGradient)" filter="url(#simonShadow)"/>
  
  <!-- 内部装饰 - 几何/理性感 -->
  <rect x="150" y="140" width="100" height="80" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.4" rx="5"/>
  <line x1="150" y1="160" x2="250" y2="160" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
  <line x1="150" y1="180" x2="250" y2="180" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
  <line x1="150" y1="200" x2="250" y2="200" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
  
  <!-- 决策符号 -->
  <circle cx="185" cy="170" r="8" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="215" cy="170" r="8" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="200" cy="195" r="8" fill="#FFFFFF" opacity="0.9"/>
  
  <!-- 金字 -->
  <text x="200" y="260" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="36" fill="#666666" font-weight="bold">金</text>
  
  <!-- SIMON 标识 -->
  <text x="200" y="320" text-anchor="middle" font-family="Inter, sans-serif" font-size="24" fill="#888888" font-weight="bold" letter-spacing="3">SIMON</text>
  
  <!-- 核心精神 -->
  <text x="200" y="355" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="20" fill="#666666">满意解</text>
  
  <!-- 五行标识 -->
  <circle cx="340" cy="60" r="25" fill="#C0C0C0" opacity="0.9"/>
  <text x="340" y="67" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="16" fill="#FFFFFF" font-weight="bold">金</text>
</svg>