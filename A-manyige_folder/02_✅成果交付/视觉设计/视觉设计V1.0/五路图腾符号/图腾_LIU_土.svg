<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="liuGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A84B"/>
      <stop offset="100%" style="stop-color:#B8953A"/>
    </linearGradient>
    <filter id="liuShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
    <filter id="liuGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="400" height="400" fill="#FAFAFA"/>
  
  <!-- 外圆环 -->
  <circle cx="200" cy="200" r="160" fill="none" stroke="#E8E8E8" stroke-width="2"/>
  <circle cx="200" cy="200" r="140" fill="none" stroke="#F0F0F0" stroke-width="1"/>
  
  <!-- 主圆形 - 土黄色 -->
  <circle cx="200" cy="180" r="100" fill="url(#liuGradient)" filter="url(#liuShadow)"/>
  
  <!-- 内部装饰 - 山形/稳重感 -->
  <path d="M140 200 L170 160 L200 190 L230 160 L260 200" fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M150 210 L175 180 L200 205 L225 180 L250 210" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.3" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- 土字 -->
  <text x="200" y="195" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="48" fill="#FFFFFF" font-weight="bold">土</text>
  
  <!-- LIU 标识 -->
  <text x="200" y="320" text-anchor="middle" font-family="Inter, sans-serif" font-size="28" fill="#D4A84B" font-weight="bold" letter-spacing="4">LIU</text>
  
  <!-- 核心精神 -->
  <text x="200" y="355" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="20" fill="#666666">惟吾德馨</text>
  
  <!-- 五行标识 -->
  <circle cx="340" cy="60" r="25" fill="#D4A84B" opacity="0.9"/>
  <text x="340" y="67" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="16" fill="#FFFFFF" font-weight="bold">土</text>
</svg>