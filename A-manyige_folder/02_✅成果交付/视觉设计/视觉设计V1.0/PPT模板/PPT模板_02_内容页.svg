<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="contentBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FAFAFA"/>
      <stop offset="100%" style="stop-color:#F5F5F5"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="1920" height="1080" fill="url(#contentBg)"/>
  
  <!-- 顶部导航条 -->
  <rect x="0" y="0" width="1920" height="80" fill="#1A1A2E"/>
  
  <!-- 顶部Logo -->
  <g transform="translate(60, 40)">
    <circle cx="0" cy="0" r="15" fill="#D4A84B"/>
    <text x="0" y="5" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="12" fill="#FFFFFF" font-weight="bold">土</text>
    
    <text x="30" y="5" font-family="Noto Sans SC, sans-serif" font-size="16" fill="#FFFFFF">满意解研究所</text>
  </g>
  
  <!-- 页面标题 -->
  <text x="960" y="55" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="28" fill="#FFFFFF">[页面标题]</text>
  
  <!-- 内容区域 -->
  <rect x="120" y="140" width="1680" height="820" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  
  <!-- 内容占位符 -->
  <text x="960" y="550" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="32" fill="#CCCCCC">[内容区域]</text>
  
  
  <!-- 底部页码 -->
  <text x="1800" y="1020" text-anchor="end" font-family="Inter, sans-serif" font-size="16" fill="#888888">[页码]</text>
  
  <!-- 底部装饰线 -->
  <line x1="120" y1="1040" x2="1800" y2="1040" stroke="#E0E0E0" stroke-width="1"/>
  
  <!-- 底部Logo -->
  <text x="120" y="1065" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#888888">满意解研究所 · 硬科技合伙人决策教练</text>
</svg>