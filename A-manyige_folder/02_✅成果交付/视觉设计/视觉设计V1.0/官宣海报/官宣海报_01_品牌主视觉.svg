<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E"/>
      <stop offset="100%" style="stop-color:#2C3E50"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A84B"/>
      <stop offset="50%" style="stop-color:#2E8B57"/>
      <stop offset="100%" style="stop-color:#2C3E50"/>
    </linearGradient>
    
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1080" height="1920" fill="url(#bgGradient)"/>
  
  <!-- 装饰圆环 -->
  <circle cx="540" cy="500" r="300" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.1"/>
  <circle cx="540" cy="500" r="350" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.05"/>
  
  <!-- 顶部标签 -->
  <rect x="440" y="80" width="200" height="50" rx="25" fill="#D4A84B" opacity="0.9"/>
  <text x="540" y="115" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="20" fill="#FFFFFF" font-weight="bold">正式官宣</text>
  
  <!-- Logo图标区域 -->
  <g transform="translate(540, 500)" filter="url(#softShadow)">
    <!-- 外圆 -->
    <circle cx="0" cy="0" r="150" fill="none" stroke="#D4A84B" stroke-width="2" opacity="0.5"/>
    <circle cx="0" cy="0" r="130" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.2"/>
    
    <!-- 五行符号 -->
    <circle cx="0" cy="0" r="30" fill="#D4A84B"/>
    <text x="0" y="10" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="24" fill="#FFFFFF" font-weight="bold">土</text>
    
    <circle cx="80" cy="-45" r="22" fill="#C0C0C0"/>
    <text x="80" y="-38" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="16" fill="#333333" font-weight="bold">金</text>
    
    <circle cx="60" cy="65" r="22" fill="#2C3E50"/>
    <text x="60" y="72" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="16" fill="#FFFFFF" font-weight="bold">水</text>
    
    <circle cx="-60" cy="65" r="22" fill="#2E8B57"/>
    <text x="-60" y="72" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="16" fill="#FFFFFF" font-weight="bold">木</text>
    
    <circle cx="-80" cy="-45" r="22" fill="#E74C3C"/>
    <text x="-80" y="-38" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="16" fill="#FFFFFF" font-weight="bold">火</text>
    
    <!-- 相生连线 -->
    <path d="M 0,-30 Q 40,-50 70,-40" fill="none" stroke="#D4A84B" stroke-width="2" opacity="0.6" marker-end="url(#arrow1)"/>
    <path d="M 90,-25 Q 100,10 75,45" fill="none" stroke="#C0C0C0" stroke-width="2" opacity="0.6" marker-end="url(#arrow2)"/>
    <path d="M 40,80 Q 0,95 -40,80" fill="none" stroke="#2C3E50" stroke-width="2" opacity="0.6" marker-end="url(#arrow3)"/>
    <path d="M -75,45 Q -100,10 -90,-25" fill="none" stroke="#2E8B57" stroke-width="2" opacity="0.6" marker-end="url(#arrow4)"/>
    <path d="M -70,-40 Q -40,-50 0,-30" fill="none" stroke="#E74C3C" stroke-width="2" opacity="0.6" marker-end="url(#arrow5)"/>
  </g>
  
  <!-- 箭头定义 -->
  <defs>
    <marker id="arrow1" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#D4A84B"/>
    </marker>
    <marker id="arrow2" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#C0C0C0"/>
    </marker>
    <marker id="arrow3" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#2C3E50"/>
    </marker>
    <marker id="arrow4" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#2E8B57"/>
    </marker>
    <marker id="arrow5" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#E74C3C"/>
    </marker>
  </defs>
  
  <!-- 品牌名称 -->
  <text x="540" y="750" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="72" fill="#FFFFFF" font-weight="bold" letter-spacing="12">满意解研究所</text>
  
  <text x="540" y="830" text-anchor="middle" font-family="Inter, sans-serif" font-size="28" fill="#AAAAAA" letter-spacing="6">SATISFICING INSTITUTE</text>
  
  <!-- 分隔线 -->
  <line x1="340" y1="880" x2="740" y2="880" stroke="#D4A84B" stroke-width="2"/>
  
  <!-- 副标题 -->
  <text x="540" y="950" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="36" fill="#FFFFFF" font-weight="300">硬科技合伙人决策教练</text>
  
  <!-- 核心方法论 -->
  <text x="540" y="1050" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="24" fill="#D4A84B">左脑逻辑 × 右脑直觉</text>
  
  <!-- 服务介绍 -->
  <g transform="translate(540, 1250)">
    <text x="0" y="0" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="28" fill="#FFFFFF" opacity="0.9">为硬科技创业者提供</text>
    <text x="0" y="50" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="28" fill="#FFFFFF" opacity="0.9">合伙人选择的系统化决策支持</text>
    
    <text x="0" y="130" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="32" fill="#D4A84B" font-weight="bold">满意解，而非最优解</text>
  </g>
  
  <!-- 底部行动号召 -->
  <rect x="340" y="1550" width="400" height="80" rx="40" fill="#D4A84B" filter="url(#softShadow)"/>
  <text x="540" y="1600" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="28" fill="#1A1A2E" font-weight="bold">立即咨询</text>
  
  <!-- 联系方式 -->
  <text x="540" y="1720" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="20" fill="#888888">公众号：满意解研究所</text>
  
  <!-- 底部装饰 -->
  <text x="540" y="1850" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" fill="#555555">V1.0 · 2026年3月</text>
</svg>