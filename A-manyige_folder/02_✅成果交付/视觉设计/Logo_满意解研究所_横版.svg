<svg viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="50%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#feca57"/>
    </linearGradient>
  </defs>
  
  <!-- 五行螺旋图标 -->
  <g transform="translate(60,60)">
    <circle cx="0" cy="-25" r="12" fill="#e94560" opacity="0.9"/>
    <circle cx="23" cy="-8" r="12" fill="#feca57" opacity="0.9"/>
    <circle cx="14" cy="20" r="12" fill="#7cb342" opacity="0.9"/>
    <circle cx="-14" cy="20" r="12" fill="#4a90e2" opacity="0.9"/>
    <circle cx="-23" cy="-8" r="12" fill="#c0c0c0" opacity="0.9"/>
    <path d="M0,-25 Q12,-17 23,-8" stroke="url(#logoGrad)" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M23,-8 Q19,6 14,20" stroke="url(#logoGrad)" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M14,20 Q0,25 -14,20" stroke="url(#logoGrad)" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M-14,20 Q-19,6 -23,-8" stroke="url(#logoGrad)" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M-23,-8 Q-12,-17 0,-25" stroke="url(#logoGrad)" stroke-width="2" fill="none" opacity="0.6"/>
  </g>
  
  <!-- 品牌名称 -->
  <text x="130" y="55" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="url(#logoGrad)">满意解研究所</text>
  <text x="130" y="85" font-family="Arial, sans-serif" font-size="14" fill="#888888">SATISFICING INSTITUTE</text>
</svg>