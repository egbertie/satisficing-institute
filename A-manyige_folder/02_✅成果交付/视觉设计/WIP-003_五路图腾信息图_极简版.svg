<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <style>
      .mini-title { font-family: 'Noto Serif SC', 'SimSun', serif; font-weight: 700; font-size: 32px; }
      .mini-totem { font-family: 'Noto Sans SC', 'SimHei', sans-serif; font-weight: 700; font-size: 14px; }
      .mini-spirit { font-family: 'Noto Serif SC', 'SimSun', serif; font-size: 12px; }
      .mini-caption { font-family: 'Noto Sans SC', 'SimHei', sans-serif; font-size: 10px; }
    </style>
  </defs>
  
  <rect width="600" height="800" fill="#FAFAFA"/>
  
  <text x="300" y="60" text-anchor="middle" class="mini-title" fill="#1A1A1A">五路图腾</text>
  <text x="300" y="85" text-anchor="middle" class="mini-caption" fill="#888">五行相生 · V2.4</text>
  
  <circle cx="300" cy="180" r="60" fill="#8B7355"/>
  <text x="300" y="175" text-anchor="middle" fill="#FFFFFF" class="mini-totem">LIU</text>
  <text x="300" y="195" text-anchor="middle" fill="#FFFFFF" class="mini-spirit">惟吾德馨</text>
  
  <circle cx="450" cy="320" r="60" fill="#A8A8A8"/>
  <text x="450" y="315" text-anchor="middle" fill="#FFFFFF" class="mini-totem">SIMON</text>
  <text x="450" y="335" text-anchor="middle" fill="#FFFFFF" class="mini-spirit">满意解</text>
  
  <circle cx="380" cy="500" r="60" fill="#5B9BD5"/>
  <text x="380" y="495" text-anchor="middle" fill="#FFFFFF" class="mini-totem">GUANYIN</text>
  <text x="380" y="515" text-anchor="middle" fill="#FFFFFF" class="mini-spirit">自在从容</text>
  
  <circle cx="220" cy="500" r="60" fill="#7BA05B"/>
  <text x="220" y="495" text-anchor="middle" fill="#FFFFFF" class="mini-totem">CONFUCIUS</text>
  <text x="220" y="515" text-anchor="middle" fill="#FFFFFF" class="mini-spirit">仁者爱人</text>
  
  <circle cx="150" cy="320" r="60" fill="#D4574A"/>
  <text x="150" y="315" text-anchor="middle" fill="#FFFFFF" class="mini-totem">HUINENG</text>
  <text x="150" y="335" text-anchor="middle" fill="#FFFFFF" class="mini-spirit">知行合一</text>
  
  <circle cx="300" cy="340" r="45" fill="#FFFFFF" stroke="#2C3E50" stroke-width="2"/>
  <text x="300" y="345" text-anchor="middle" font-family="'Noto Sans SC', 'SimHei', sans-serif" font-size="12" fill="#2C3E50">指挥官</text>
  
  <path d="M300 120 Q360 320 300 440 Q240 320 300 120" fill="none" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="5,3"/>
  
  <path d="M360 180 Q420 250 390 260" fill="none" stroke="#8B7355" stroke-width="1.5" marker-end="url(#mini-arrow-brown)"/>
  <defs><marker id="mini-arrow-brown" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto"><polygon points="0 0, 6 2.5, 0 5" fill="#8B7355"/></marker></defs>
  
  <path d="M450 380 Q420 450 380 440" fill="none" stroke="#A8A8A8" stroke-width="1.5" marker-end="url(#mini-arrow-gray)"/>
  <defs><marker id="mini-arrow-gray" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto"><polygon points="0 0, 6 2.5, 0 5" fill="#A8A8A8"/></marker></defs>
  
  <path d="M320 500 Q270 500 280 500" fill="none" stroke="#5B9BD5" stroke-width="1.5" marker-end="url(#mini-arrow-blue)"/>
  <defs><marker id="mini-arrow-blue" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto"><polygon points="0 0, 6 2.5, 0 5" fill="#5B9BD5"/></marker></defs>
  
  <path d="M220 440 Q180 380 180 380" fill="none" stroke="#7BA05B" stroke-width="1.5" marker-end="url(#mini-arrow-green)"/>
  <defs><marker id="mini-arrow-green" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto"><polygon points="0 0, 6 2.5, 0 5" fill="#7BA05B"/></marker></defs>
  
  <path d="M150 260 Q200 200 240 180" fill="none" stroke="#D4574A" stroke-width="1.5" marker-end="url(#mini-arrow-red)"/>
  <defs><marker id="mini-arrow-red" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto"><polygon points="0 0, 6 2.5, 0 5" fill="#D4574A"/></marker></defs>
  
  <text x="300" y="620" text-anchor="middle" class="mini-caption" fill="#888">土生金 · 金生水 · 水生木 · 木生火 · 火生土</text>
  
  <text x="300" y="760" text-anchor="middle" class="mini-caption" fill="#BBB">满意解研究所 · V2.4</text>
</svg>