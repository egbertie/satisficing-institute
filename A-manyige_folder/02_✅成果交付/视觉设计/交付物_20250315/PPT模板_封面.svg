<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E"/>
      <stop offset="100%" style="stop-color:#2C3E50"/>
    </linearGradient>
    
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A84B"/>
      <stop offset="100%" style="stop-color:#B8953A"/>
    </linearGradient>
    
    <filter id="textShadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1920" height="1080" fill="url(#bgGradient)"/>
  
  <!-- 装饰性背景 -->
  <g opacity="0.03">
    <circle cx="960" cy="540" r="400" fill="none" stroke="#FFFFFF" stroke-width="1"/>
    <circle cx="960" cy="540" r="350" fill="none" stroke="#FFFFFF" stroke-width="1"/>
    <circle cx="960" cy="540" r="300" fill="none" stroke="#FFFFFF" stroke-width="1"/>
  </g>
  
  <!-- 顶部Logo区域 -->
  <g transform="translate(100, 60)">
    <!-- 小Logo图标 -->
    <circle cx="0" cy="0" r="25" fill="none" stroke="#D4A84B" stroke-width="1.5"/>
    
    <circle cx="0" cy="0" r="6" fill="#D4A84B"/>
    
    <text x="0" y="2" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="6" fill="#FFFFFF">土</text>
    
    <circle cx="12" cy="-8" r="5" fill="#C0C0C0"/>
    
    <text x="12" y="-5" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="5" fill="#333333">金</text>
    
    <circle cx="10" cy="10" r="5" fill="#2C3E50"/>
    
    <text x="10" y="13" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="5" fill="#FFFFFF">水</text>
    
    <circle cx="-10" cy="10" r="5" fill="#2E8B57"/>
    
    <text x="-10" y="13" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="5" fill="#FFFFFF">木</text>
    
    <circle cx="-12" cy="-8" r="5" fill="#E74C3C"/>
    
    <text x="-12" y="-5" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="5" fill="#FFFFFF">火</text>
    
    <text x="40" y="5" font-family="Noto Serif SC, serif" font-size="16" fill="#FFFFFF">满意解研究所</text>
  </g>
  
  <!-- 主标题区域 - 居中 -->
  <g transform="translate(960, 450)" filter="url(#textShadow)">
    <text x="0" y="0" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="96" fill="#FFFFFF" font-weight="bold" letter-spacing="20">演示标题</text>
    
    <text x="0" y="80" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="32" fill="#D4A84B">副标题 / Subtitle</text>
  </g>
  
  <!-- 底部装饰线 -->
  <rect x="0" y="1060" width="1920" height="20" fill="#D4A84B"/>
  
  <!-- 底部页码 -->
  <text x="1860" y="1040" text-anchor="end" font-family="Inter, sans-serif" font-size="16" fill="#666666">01</text>
  
  <!-- 底部品牌名 -->
  <text x="60" y="1040" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#666666">满意解研究所 · 硬科技合伙人决策教练</text>
</svg>