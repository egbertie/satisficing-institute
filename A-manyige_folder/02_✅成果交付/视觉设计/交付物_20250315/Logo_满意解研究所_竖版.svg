<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <defs>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E"/>
      <stop offset="100%" style="stop-color:#2C3E50"/>
    </linearGradient>
    
    <filter id="logoShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="300" height="400" fill="#FAFAFA"/>
  
  <!-- Logo图标 - 五行相生螺旋 -->
  <g transform="translate(150, 140)" filter="url(#logoShadow)">
    <!-- 外圆环 -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="#E0E0E0" stroke-width="2"/>
    <circle cx="0" cy="0" r="88" fill="none" stroke="#F0F0F0" stroke-width="1"/>
    
    <!-- 五行符号 - 螺旋排列 -->
    <!-- 土 - 中心 -->
    <circle cx="0" cy="0" r="20" fill="#D4A84B"/>
    <text x="0" y="7" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="18" fill="#FFFFFF" font-weight="bold">土</text>
    
    <!-- 金 - 右上 -->
    <circle cx="55" cy="-35" r="16" fill="#C0C0C0"/>
    <text x="55" y="-28" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="14" fill="#333333" font-weight="bold">金</text>
    
    <!-- 水 - 右下 -->
    <circle cx="45" cy="45" r="16" fill="#2C3E50"/>
    <text x="45" y="52" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="14" fill="#FFFFFF" font-weight="bold">水</text>
    
    <!-- 木 - 左下 -->
    <circle cx="-45" cy="45" r="16" fill="#2E8B57"/>
    <text x="-45" y="52" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="14" fill="#FFFFFF" font-weight="bold">木</text>
    
    <!-- 火 - 左上 -->
    <circle cx="-55" cy="-35" r="16" fill="#E74C3C"/>
    <text x="-55" y="-28" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="14" fill="#FFFFFF" font-weight="bold">火</text>
    
    <!-- 相生连接线 -->
    <path d="M 0,-20 Q 30,-45 50,-45" fill="none" stroke="#D4A84B" stroke-width="2" opacity="0.6"/>
    <path d="M 65,-22 Q 70,5 58,30" fill="none" stroke="#C0C0C0" stroke-width="2" opacity="0.6"/>
    <path d="M 30,55 Q 0,65 -30,55" fill="none" stroke="#2C3E50" stroke-width="2" opacity="0.6"/>
    <path d="M -58,30 Q -70,5 -65,-22" fill="none" stroke="#2E8B57" stroke-width="2" opacity="0.6"/>
    <path d="M -50,-45 Q -30,-45 0,-20" fill="none" stroke="#E74C4C" stroke-width="2" opacity="0.6"/>
  </g>
  
  <!-- 品牌名称 -->
  <g transform="translate(150, 300)">
    <!-- 中文名称 -->
    <text x="0" y="0" text-anchor="middle" font-family="Noto Serif SC, Source Han Serif SC, serif" font-size="32" fill="url(#mainGradient)" font-weight="bold" letter-spacing="6">满意解</text>
    <text x="0" y="40" text-anchor="middle" font-family="Noto Serif SC, Source Han Serif SC, serif" font-size="32" fill="url(#mainGradient)" font-weight="bold" letter-spacing="6">研究所</text>
    
    <!-- 英文名称 -->
    <text x="0" y="75" text-anchor="middle" font-family="Inter, Roboto, sans-serif" font-size="12" fill="#666666" letter-spacing="2">SATISFICING</text>
    <text x="0" y="90" text-anchor="middle" font-family="Inter, Roboto, sans-serif" font-size="12" fill="#666666" letter-spacing="2">INSTITUTE</text>
    
    <!-- 装饰线 -->
    <line x1="80" y1="105" x2="220" y2="105" stroke="#D4A84B" stroke-width="2"/>
  </g>
  
  <!-- 底部版本标记 -->
  <text x="280" y="390" text-anchor="end" font-family="Inter, sans-serif" font-size="10" fill="#CCCCCC">V1.0</text>
</svg>