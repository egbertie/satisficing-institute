<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <!-- 渐变背景 -->
    <linearGradient id="heroGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E"/>
      <stop offset="50%" style="stop-color:#2C3E50"/>
      <stop offset="100%" style="stop-color:#1A1A2E"/>
    </linearGradient>
    
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A84B"/>
      <stop offset="100%" style="stop-color:#B8953A"/>
    </linearGradient>
    
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="textShadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1080" height="1920" fill="url(#heroGradient)"/>
  
  <!-- 装饰性背景图案 -->
  <g opacity="0.03">
    <circle cx="540" cy="400" r="300" fill="none" stroke="#FFFFFF" stroke-width="1"/>
    <circle cx="540" cy="400" r="250" fill="none" stroke="#FFFFFF" stroke-width="1"/>
    <circle cx="540" cy="400" r="200" fill="none" stroke="#FFFFFF" stroke-width="1"/>
  </g>
  
  <!-- 顶部Logo区域 -->
  <g transform="translate(540, 200)">
    <!-- 五行图标 -->
    <circle cx="0" cy="0" r="70" fill="none" stroke="#D4A84B" stroke-width="2" opacity="0.5"/>
    
    <circle cx="0" cy="0" r="15" fill="#D4A84B"/>
    <text x="0" y="5" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="14" fill="#FFFFFF" font-weight="bold">土</text>
    
    <circle cx="35" cy="-20" r="12" fill="#C0C0C0"/>
    <text x="35" y="-15" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="10" fill="#333333" font-weight="bold">金</text>
    
    <circle cx="28" cy="28" r="12" fill="#2C3E50"/>
    <text x="28" y="33" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="10" fill="#FFFFFF" font-weight="bold">水</text>
    
    <circle cx="-28" cy="28" r="12" fill="#2E8B57"/>
    <text x="-28" y="33" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="10" fill="#FFFFFF" font-weight="bold">木</text>
    
    <circle cx="-35" cy="-20" r="12" fill="#E74C3C"/>
    <text x="-35" y="-15" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="10" fill="#FFFFFF" font-weight="bold">火</text>
  </g>
  
  <!-- 主标题 -->
  <g transform="translate(540, 450)" filter="url(#textShadow)">
    <text x="0" y="0" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="72" fill="#FFFFFF" font-weight="bold" letter-spacing="16">满意解研究所</text>
    
    <text x="0" y="70" text-anchor="middle" font-family="Inter, sans-serif" font-size="24" fill="#D4A84B" letter-spacing="8">SATISFICING INSTITUTE</text>
  </g>
  
  <!-- 副标题 -->
  <g transform="translate(540, 600)">
    <line x1="-200" y1="0" x2="200" y2="0" stroke="#D4A84B" stroke-width="2"/>
    
    <text x="0" y="50" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="32" fill="#FFFFFF" letter-spacing="4">硬科技合伙人决策教练</text>
    
    <text x="0" y="100" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="20" fill="#AAAAAA">专注硬科技转化的合伙人匹配决策支持</text>
  </g>
  
  <!-- 核心主张 -->
  <g transform="translate(540, 850)">
    <rect x="-350" y="-80" width="700" height="160" rx="20" fill="#FFFFFF" opacity="0.05"/>
    
    <text x="0" y="-20" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="28" fill="#D4A84B">左脑逻辑 + 右脑直觉</text>
    
    <text x="0" y="30" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="24" fill="#FFFFFF">基于西蒙"满意解"理论的综合决策方法论</text>
  </g>
  
  <!-- 五路图腾简述 -->
  <g transform="translate(540, 1100)">
    <text x="0" y="0" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="20" fill="#888888">我们的方法论根基</text>
    
    <text x="0" y="60" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="32" fill="#FFFFFF" letter-spacing="8">五路图腾 · 五行相生</text>
    
    <text x="0" y="110" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="18" fill="#AAAAAA">刘禹锡 · 司马贺 · 观自在 · 孔子 · 六祖慧能</text>
  </g>
  
  <!-- 服务定位 -->
  <g transform="translate(540, 1350)">
    <rect x="-400" y="0" width="800" height="200" rx="16" fill="#FFFFFF" opacity="0.03"/>
    
    <text x="0" y="50" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="18" fill="#888888">服务对象</text>
    
    <text x="0" y="100" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="28" fill="#FFFFFF">获得政府补贴的初创期硬件企业家</text>
    
    <text x="0" y="150" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="20" fill="#D4A84B">解决核心痛点：合伙人选择决策</text>
  </g>
  
  <!-- 底部信息 -->
  <g transform="translate(540, 1700)">
    <line x1="-150" y1="0" x2="150" y2="0" stroke="#D4A84B" stroke-width="2"/>
    
    <text x="0" y="50" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="24" fill="#FFFFFF" font-weight="bold">2026年3月25日 正式官宣</text>
    
    <text x="0" y="100" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="16" fill="#888888">敬请期待</text>
  </g>
  
  <!-- 角落装饰 -->
  <text x="50" y="1870" font-family="Inter, sans-serif" font-size="12" fill="#444444">SATISFICING INSTITUTE</text>
  
  <text x="1030" y="1870" text-anchor="end" font-family="Inter, sans-serif" font-size="12" fill="#444444">V1.0 2026.03.25</text>
</svg>