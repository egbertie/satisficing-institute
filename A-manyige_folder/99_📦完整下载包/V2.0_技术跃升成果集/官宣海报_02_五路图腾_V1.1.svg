<svg viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="600" height="800" fill="url(#bgGrad)"/>
  
  <!-- 标题区域 -->
  <text x="300" y="70" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#F4A460" text-anchor="middle">五路图腾</text>
  <text x="300" y="110" font-family="Arial, sans-serif" font-size="28" fill="#ffffff" text-anchor="middle">决策罗盘 V1.1</text>
  
  <!-- 副标题 -->
  <text x="300" y="145" font-family="Arial, sans-serif" font-size="16" fill="#a0a0a0" text-anchor="middle">东方智慧 × 决策科学 · 72小时极限评估</text>
  
  <!-- 分隔线 -->
  <line x1="100" y1="170" x2="500" y2="170" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  
  <!-- ====== 五路图腾展示区域 ====== -->
  
  <!-- LIU (土) - 顶部居中 -->
  <g transform="translate(300, 230)">
    <circle cx="0" cy="0" r="35" fill="#9C6B3E" opacity="0.9" filter="url(#glow)"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">土</text>
  </g>
  <text x="300" y="290" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#F4A460" text-anchor="middle">LIU</text>
  <text x="300" y="315" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">刘禹锡</text>
  <text x="300" y="340" font-family="Arial, sans-serif" font-size="12" fill="#a0a0a0" text-anchor="middle">惟吾德馨</text>
  <text x="300" y="360" font-family="Arial, sans-serif" font-size="11" fill="#888888" text-anchor="middle">价值纯度 · 心性修炼</text>
  
  <!-- SIMON (金) - 右上 -->
  <g transform="translate(420, 330)">
    <circle cx="0" cy="0" r="35" fill="#C0C0C0" opacity="0.9" filter="url(#glow)"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e" text-anchor="middle">金</text>
  </g>
  <text x="420" y="390" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#F4A460" text-anchor="middle">SIMON</text>
  <text x="420" y="415" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">司马贺</text>
  <text x="420" y="440" font-family="Arial, sans-serif" font-size="12" fill="#a0a0a0" text-anchor="middle">满意解</text>
  <text x="420" y="460" font-family="Arial, sans-serif" font-size="11" fill="#888888" text-anchor="middle">理性决策框架</text>
  
  <!-- CONFUCIUS (木) - 右下 -->
  <g transform="translate(420, 520)">
    <circle cx="0" cy="0" r="35" fill="#4CAF50" opacity="0.9" filter="url(#glow)"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">木</text>
  </g>
  <text x="420" y="580" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F4A460" text-anchor="middle">CONFUCIUS</text>
  <text x="420" y="605" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">孔子/儒商</text>
  <text x="420" y="630" font-family="Arial, sans-serif" font-size="12" fill="#a0a0a0" text-anchor="middle">生生不息</text>
  <text x="420" y="650" font-family="Arial, sans-serif" font-size="11" fill="#888888" text-anchor="middle">感知力 · 儒商伦理</text>
  
  <!-- HUINENG (火) - 左下 -->
  <g transform="translate(180, 520)">
    <circle cx="0" cy="0" r="35" fill="#E94560" opacity="0.9" filter="url(#glow)"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">火</text>
  </g>
  <text x="180" y="580" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F4A460" text-anchor="middle">HUINENG</text>
  <text x="180" y="605" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">六祖</text>
  <text x="180" y="630" font-family="Arial, sans-serif" font-size="12" fill="#a0a0a0" text-anchor="middle">顿悟/红莲淬火</text>
  <text x="180" y="650" font-family="Arial, sans-serif" font-size="11" fill="#888888" text-anchor="middle">极限压力测试 · 重生</text>
  
  <!-- GUANYIN (水) - 左上 -->
  <g transform="translate(180, 330)">
    <circle cx="0" cy="0" r="35" fill="#4A90E2" opacity="0.9" filter="url(#glow)"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">水</text>
  </g>
  <text x="180" y="390" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F4A460" text-anchor="middle">GUANYIN</text>
  <text x="180" y="415" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">观自在</text>
  <text x="180" y="440" font-family="Arial, sans-serif" font-size="12" fill="#a0a0a0" text-anchor="middle">自在从容</text>
  <text x="180" y="460" font-family="Arial, sans-serif" font-size="11" fill="#888888" text-anchor="middle">压力管理 · 状态调节</text>
  
  <!-- 分隔线 -->
  <line x1="100" y1="700" x2="500" y2="700" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  
  <!-- 底部信息 -->
  <text x="300" y="740" font-family="Arial, sans-serif" font-size="14" fill="#F4A460" text-anchor="middle">满意解研究所</text>
  <text x="300" y="765" font-family="Arial, sans-serif" font-size="12" fill="#888888" text-anchor="middle">Satisficing Institute</text>
  <text x="300" y="785" font-family="Arial, sans-serif" font-size="11" fill="#666666" text-anchor="middle">合伙人选择决策教练</text>
  
</svg>