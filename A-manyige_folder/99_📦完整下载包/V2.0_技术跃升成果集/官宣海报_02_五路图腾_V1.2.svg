<svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradV12" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <filter id="glowV12">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F4A460" />
    </marker>
  </defs>
  
  <!-- 背景 -->
  <rect width="800" height="800" fill="url(#bgGradV12)"/>
  
  <!-- 标题区域 -->
  <text x="400" y="60" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#F4A460" text-anchor="middle">五路图腾</text>
  <text x="400" y="100" font-family="Arial, sans-serif" font-size="28" fill="#ffffff" text-anchor="middle">决策罗盘 V1.2 · 相生关系图</text>
  
  <text x="400" y="130" font-family="Arial, sans-serif" font-size="14" fill="#a0a0a0" text-anchor="middle">相生关系：土 → 金 → 水 → 木 → 火 → 土</text>
  
  <!-- ====== 中心相生关系图 ====== -->
  <g transform="translate(400, 400)">
    
    <!-- 相生连线（带箭头） -->
    <!-- 土 → 金 -->
    <path d="M 0,-120 Q 80,-100 100,-30" stroke="#F4A460" stroke-width="3" fill="none" marker-end="url(#arrowhead)" opacity="0.8"/>
    
    <!-- 金 → 水 -->
    <path d="M 120,0 Q 100,60 60,100" stroke="#F4A460" stroke-width="3" fill="none" marker-end="url(#arrowhead)" opacity="0.8"/>
    
    <!-- 水 → 木 -->
    <path d="M 30,120 Q -30,120 -90,90" stroke="#F4A460" stroke-width="3" fill="none" marker-end="url(#arrowhead)" opacity="0.8"/>
    
    <!-- 木 → 火 -->
    <path d="M -120,30 Q -120,-30 -120,-90" stroke="#F4A460" stroke-width="3" fill="none" marker-end="url(#arrowhead)" opacity="0.8"/>
    
    <!-- 火 → 土 -->
    <path d="M -60,-100 Q -30,-120 0,-130" stroke="#F4A460" stroke-width="3" fill="none" marker-end="url(#arrowhead)" opacity="0.8"/>
    
    <!-- LIU (土) - 顶部 -->
    <g transform="translate(0, -150)">
      <circle cx="0" cy="0" r="45" fill="#9C6B3E" opacity="0.95" filter="url(#glowV12)"/>
      <text x="0" y="-35" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F4A460" text-anchor="middle">LIU</text>
      <text x="0" y="5" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">土</text>
      <text x="0" y="35" font-family="Arial, sans-serif" font-size="12" fill="#a0a0a0" text-anchor="middle">刘禹锡</text>
    </g>
    
    <!-- SIMON (金) - 右上 -->
    <g transform="translate(130, -50)">
      <circle cx="0" cy="0" r="45" fill="#C0C0C0" opacity="0.95" filter="url(#glowV12)"/>
      <text x="0" y="-35" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e" text-anchor="middle">SIMON</text>
      <text x="0" y="5" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e" text-anchor="middle">金</text>
      <text x="0" y="35" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" text-anchor="middle">司马贺</text>
    </g>
    
    <!-- CONFUCIUS (木) - 右下 -->
    <g transform="translate(80, 110)">
      <circle cx="0" cy="0" r="45" fill="#4CAF50" opacity="0.95" filter="url(#glowV12)"/>
      <text x="0" y="-35" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">CONFUCIUS</text>
      <text x="0" y="5" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">木</text>
      <text x="0" y="35" font-family="Arial, sans-serif" font-size="12" fill="#a0a0a0" text-anchor="middle">孔子/儒商</text>
    </g>
    
    <!-- HUINENG (火) - 左下 -->
    <g transform="translate(-80, 110)">
      <circle cx="0" cy="0" r="45" fill="#E94560" opacity="0.95" filter="url(#glowV12)"/>
      <text x="0" y="-35" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">HUINENG</text>
      <text x="0" y="5" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">火</text>
      <text x="0" y="35" font-family="Arial, sans-serif" font-size="12" fill="#a0a0a0" text-anchor="middle">六祖</text>
    </g>
    
    <!-- GUANYIN (水) - 左上 -->
    <g transform="translate(-130, -50)">
      <circle cx="0" cy="0" r="45" fill="#4A90E2" opacity="0.95" filter="url(#glowV12)"/>
      <text x="0" y="-35" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">GUANYIN</text>
      <text x="0" y="5" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">水</text>
      <text x="0" y="35" font-family="Arial, sans-serif" font-size="12" fill="#a0a0a0" text-anchor="middle">观自在</text>
    </g>
    
  </g>
  
  <!-- ====== 下方详情说明 ====== -->
  <!-- 分隔线 -->
  <line x1="50" y1="580" x2="750" y2="580" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  
  <!-- 五路图腾详情 -->
  <g transform="translate(0, 600)">
    
    <!-- LIU详情 -->
    <g transform="translate(80, 0)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#9C6B3E" text-anchor="middle">LIU·土</text>
      <text x="0" y="20" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">惟吾德馨</text>
      <text x="0" y="38" font-family="Arial, sans-serif" font-size="10" fill="#888888" text-anchor="middle">价值纯度·心性修炼</text>
    </g>
    
    <!-- SIMON详情 -->
    <g transform="translate(240, 0)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#C0C0C0" text-anchor="middle">SIMON·金</text>
      <text x="0" y="20" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">满意解</text>
      <text x="0" y="38" font-family="Arial, sans-serif" font-size="10" fill="#888888" text-anchor="middle">理性决策框架</text>
    </g>
    
    <!-- CONFUCIUS详情 -->
    <g transform="translate(400, 0)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#4CAF50" text-anchor="middle">CONFUCIUS·木</text>
      <text x="0" y="20" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">生生不息</text>
      <text x="0" y="38" font-family="Arial, sans-serif" font-size="10" fill="#888888" text-anchor="middle">感知力·儒商伦理</text>
    </g>
    
    <!-- HUINENG详情 -->
    <g transform="translate(560, 0)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#E94560" text-anchor="middle">HUINENG·火</text>
      <text x="0" y="20" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">顿悟/红莲淬火</text>
      <text x="0" y="38" font-family="Arial, sans-serif" font-size="10" fill="#888888" text-anchor="middle">极限压力测试</text>
    </g>
    
    <!-- GUANYIN详情 -->
    <g transform="translate(720, 0)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#4A90E2" text-anchor="middle">GUANYIN·水</text>
      <text x="0" y="20" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">自在从容</text>
      <text x="0" y="38" font-family="Arial, sans-serif" font-size="10" fill="#888888" text-anchor="middle">压力管理·状态调节</text>
    </g>
    
  </g>
  
  <!-- 分隔线 -->
  <line x1="50" y1="680" x2="750" y2="680" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  
  <!-- 底部信息 -->
  <text x="400" y="730" font-family="Arial, sans-serif" font-size="18" fill="#F4A460" text-anchor="middle">满意解研究所 · Satisficing Institute</text>
  <text x="400" y="755" font-family="Arial, sans-serif" font-size="13" fill="#888888" text-anchor="middle">合伙人选择决策教练 · 72小时极限评估 · 数字替身会诊</text>
  
  <text x="400" y="780" font-family="Arial, sans-serif" font-size="11" fill="#666666" text-anchor="middle">东方智慧 × 决策科学 · 土→金→水→木→火→土</text>
  
</svg>