# 满意解知识管理系统 - Core定义文件
# 产品体系定义

产品矩阵:
  - 名称: 决策基因体检
    英文: Decision DNA Screening
    定位: 流量入口/筛查工具
    时长: 2-3小时
    价格区间: "¥3,000-5,000"
    交付物: 个人决策风格报告+风险提示
    目标客户: 所有硬科技创业者
    
  - 名称: 合伙人匹配诊断
    英文: Partner Fit Diagnosis
    定位: 核心产品/验证模式
    时长: 72小时
    价格区间: "¥30,000-50,000"
    交付物: 合伙人匹配度报告+决策建议
    目标客户: 有明确合伙候选人的创业者
    MVP: true
    
  - 名称: 关键决策陪跑
    英文: Decision Coaching Standard
    定位: 收入主力/深度服务
    时长: 3-6个月
    价格区间: "¥150,000-300,000"
    交付物: 决策日志+关键节点复盘+调整建议
    目标客户: 重大决策期的创始人
    
  - 名称: 年度决策顾问
    英文: Annual Decision Advisor
    定位: 高端产品/长期绑定
    时长: 12个月
    价格区间: "¥500,000-1,000,000"
    交付物: 全年决策支持+专家网络调用
    目标客户: 高速成长期企业

核心工具:
  - TRL技术成熟度评估
  - PFI合伙人匹配度评分卡
  - 决策基因体检
  - QPMS量子感知引擎
  - 沙盘模拟系统
  - 五路图腾决策校准
  - 极限72小时压力测试
  - 涌现匹配算法

版本信息:
  当前版本: V1.0
  最后更新: 2026-03-19
